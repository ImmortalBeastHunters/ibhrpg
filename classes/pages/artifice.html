<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artifice • D&D</title>

<style>
:root {
  --bg: #0f1115;
  --bg-soft: #181b22;
  --card: #1f2430;
  --border: #2c3240;
  --text: #e6e6eb;
  --muted: #9aa0b4;
  --accent: #5da9ff;
}

* { box-sizing: border-box; }

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, sans-serif;
}

/* BOTÃO VOLTAR */
.back-button {
  position: fixed;
  top: 18px;
  left: 18px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 2000;
}

.hero {
  position: relative;
  height: 520px; /* altura visual mínima */
  width: 100%;
  overflow: visible;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(15,17,21,0.15) 40%,
    var(--bg) 100%
  );
}

.hero-content {
  position: absolute;
  top: 250px; /* controla a altura visual que você quer */
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 1200px; /* card mais largo */
  padding: 0 16px;
  z-index: 5;
}

/* TOGGLE */
.toggle-wrapper {
  display: flex;
  justify-content: center;
  margin-bottom: 18px;
  opacity: 0;
  transform: translateY(-20px);
  transition:
    opacity 0.45s ease-out,
    transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
}

.toggle {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 999px;
  display: flex;
  padding: 6px;
  gap: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.toggle-wrapper.animate-in {
  opacity: 1;
  transform: translateY(0);
}

.toggle button {
  background: transparent;
  border: none;
  border-radius: 999px;
  padding: 8px 14px;
  cursor: pointer;
  opacity: 0.6;
}

.toggle button.active {
  background: white;
  opacity: 1;
}

.toggle img {
  height: 24px;
}

/* Ícone padrão (inativo) */
.toggle button img {
  filter: invert(0%) grayscale(0%);
  transition: filter 0.2s ease;
}

/* Ícone quando o botão está ativo (fundo branco) */
.toggle button.active img {
  filter: invert(100%) grayscale(100%);
}

.card {
  max-width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 34px;
  box-shadow: 0 30px 70px rgba(0,0,0,0.6);
  transition-delay: 0.08s;
  opacity: 0;
  transform: translateY(40px);
  transition:
    opacity 0.55s ease-out,
    transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
}

.card.animate-in {
  opacity: 1;
  transform: translateY(0);
}

/* CONTEÚDO */
.card h1 {
  text-align: center;
  font-size: 2.5rem;
  margin-top: 0;
}

.subtitle {
  text-align: center;
  color: var(--muted);
  margin-bottom: 34px;
}

/* SEÇÕES */
.section {
  margin-bottom: 30px;
}

.section h2 {
  font-size: 1.35rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  margin-bottom: 10px;
}

.section p {
  line-height: 1.65;
}

.table-wrapper {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
  min-width: 720px;
}

table tr.active-row{
  background: rgba(255, 255, 255, 0.08);
}

table tr{
  cursor: pointer;
  transition: background 0.25s ease;
}

@media (hover: hover) {
  table tr:hover{
    background: rgba(255, 255, 255, 0.04);
  }
}

th, td {
  border: 1px solid var(--border);
  padding: 10px;
  text-align: center;
}

th {
  background: var(--bg-soft);
}

.subclasse-container {
  display: flex;
  flex-wrap: wrap;
  grid-template-columns: repeat(auto-fit, 180px);
  gap: 20px;
  justify-content: center;
  margin: 20px auto 0;
}

.subclasse-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 0;
  width: 180px;
  overflow: hidden;
  cursor: pointer;
  text-align: center;
  color: var(--text);
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
}

.subclasse-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
  border-color: var(--accent);
}

.subclasse-card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  display: block;
}

.subclasse-card h3 {
  margin: 12px 0;
  font-size: 1rem;
}

main {
  max-width: 1100px;
  margin: auto;
  padding: 80px 16px;
  margin-top: 260px; /* espaço para o card crescer */
}

/* Links sutis destacados */
.section a{
  color: #9cd1ff;            /* cor base branca */
  font-weight: 600;          /* levemente negrito */
  text-decoration: none;
  position: relative;
  transition: color 0.3s ease;
}

/* Linha animada por baixo do link */
.section a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -2px;              /* espaçamento da linha */
  width: 0%;
  height: 2px;               /* espessura da linha */
  background: #5da9ff;       /* cor sutil da paleta (accent) */
  border-radius: 1px;        /* suaviza a linha */
  transition: width 0.3s ease;
}

/* Hover: anima a linha e muda levemente a cor */
.section a:hover {
  color: #dce6ff;            /* leve clareamento no hover */
}

.section a:hover::after {
  width: 100%;
}

@media (max-width: 600px) {
  .subclasse-container {
    gap: 14px;
  }

  .subclasse-card {
    width: calc(50% - 14px);
    max-width: 180px;
    border-radius: 12px;
  }

  .subclasse-card img {
    height: 110px;
  }

  .subclasse-card h3 {
    font-size: 0.9rem;
    margin: 8px 0;
  }
}
</style>
</head>

  <h2>Ajustes Mágicos</h2>

  <p>
    No <strong>1º Nível</strong>, você aprende como aplicar uma fagulha de magia

<div class="section">
  <h2>Conjuração</h2>

  <p>
    Você estudou os funcionamentos da magia, como canalizá-la através de objetos
    e como despertá-la dentro deles. Como resultado, você ganhou a limitada
    habilidade de conjurar magias. Para observadores, você não aparenta estar
    conjurando magias de uma forma convencional: você aparenta estar produzindo
    maravilhas através de vários itens.
  </p>

  <h3>Ferramentas Requiridas</h3>
  <p>
    Você produz os efeitos de suas magias de artífice através de suas ferramentas.
    Você precisa ter um foco de conjuração – ferramentas de ladrão ou outro tipo
    de ferramenta de artesão – em mãos quando você conjurar qualquer magia com a
    habilidade <strong>Conjuração</strong>. Você deve ser proficiente com a ferramenta
    que será usada desta forma.
  </p>
  <p>
    Após você ganhar a habilidade <strong>Infundir Item</strong> no 2º nível,
    você também pode usar quaisquer itens portando uma de suas infusões como
    foco de conjuração.
  </p>

  <h3>Truques</h3>
  <p>
    No <strong>1º nível</strong>, você conhece dois truques de sua escolha
    presentes na <a href="../magias.html">Lista de magias de Artífice</a>. Em níveis superiores,
    você aprende truques adicionais da lista de artífice de sua escolha,
    como mostrado na coluna <a href="../magias.html">Truques Conhecidos</a> na tabela do Artífice.
  </p>
  <p>
    Quando você ganhar um nível nesta classe, você pode substituir um de seus
    truques de artífice que você conhece por outro truque da <a href="../magias.html">Lista de magias de Artífice</a>.
  </p>

  <h3>Preparando e Conjurando Magias</h3>
  <p>
    A tabela do Artífice mostra quantos espaços de magia você possui para conjurar
    suas magias de artífice. Para conjurar uma de suas magias de artífice de
    1º nível ou superior, você deve consumir um espaço do nível da magia ou superior.
    Você recupera todos os espaços de magia gastos quando finaliza um descanso longo.
  </p>
  <p>
    Você prepara a sua lista de magias de artífice com as magias que estão
    disponíveis para você conjurar, escolhendo-as da <a href="../magias.html">Lista de magias de Artífice</a>.
    Quando fizer isso, escolha um número de magias igual ao seu modificador de
    Inteligência + metade do seu nível de artífice arredondado para baixo
    (mínimo de uma magia). As magias devem ser de um nível que você possua
    espaços de magia.
  </p>
  <p>
    Você pode mudar sua lista de magias quando finalizar um descanso longo.
    Preparar uma nova lista de magias de artífice requer tempo gasto em mexer
    com seus focos de conjuração: ao menos 1 minuto por nível da magia
    para cada magia em sua lista.
  </p>

  <h3>Habilidade de Conjuração</h3>
  <p>
    Inteligência é a sua habilidade de conjuração para suas magias de artífice:
    seu entendimento da teoria por trás da magia permite a você portar tais
    magias com habilidade superior. Você usa seu modificador de Inteligência
    sempre que uma magia de artífice referir-se ao seu modificador de habilidade.
    Em adição, você usa seu modificador de Inteligência quando definir a CD
    dos testes de resistência para suas magias de artífice e quando realizar
    uma jogada de ataque com uma magia.
  </p>
  <p>
    <strong>CD teste de resistência</strong> = 8 + seu bônus de proficiência + seu modificador de Inteligência
  </p>
  <p>
    <strong>Modificador de ataque de magia</strong> = seu bônus de proficiência + seu modificador de Inteligência
  </p>

  <h3>Conjuração de Ritual</h3>
  <p>
    Você pode conjurar uma magia de artífice como um ritual se tal magia possuir
    a etiqueta <strong>ritual</strong> e você possuir a magia preparada.
  </p>
</div>

<div class="section">
  <h2>Infundir Item</h2>

  <p>
    No <strong>2º nível</strong>, você ganha a habilidade de imbuir itens mundanos
    com determinadas infusões mágicas. Os itens mágicos que você cria com essa
    habilidade são efetivamente protótipos de itens permanentes.
  </p>

  <h3>Infusões Conhecidas</h3>
  <p>
    Quando você ganha essa característica, você aprende quatro infusões à sua escolha.
    Você aprende infusões adicionais quando atinge certos níveis nesta classe, como
    mostrado na coluna <a href="#infusoes">Infusões Conhecidas</a> na tabela do Artífice.
  </p>
  <p>
    Sempre que você ganhar um nível nesta classe, você pode substituir uma das
    infusões do artífice que você aprendeu por uma nova.
  </p>

  <h3>Infundindo um Item</h3>
  <p>
    Sempre que você finalizar um descanso longo, você pode tocar um objeto não-mágico
    e infundi-lo com uma de suas infusões de artífice, tornando-o um item mágico.
    Uma infusão funciona em apenas certos tipos de objeto, como especificado na
    descrição da infusão. Se o item requer sintonização, você pode sintonizar-se com
    ele no instante que você infundir o item ou você pode renunciar à sintonização
    para que outra pessoa possa sintonizar-se com o item. Se você decidir sintonizar-se
    com o item mais tarde, você deve fazê-lo usando o procedimento comum para sintonização.
  </p>
  <p>
    Sua infusão permanece em um item indefinidamente, mas quando você morrer, a
    infusão desaparece após um número de dias igual ao seu modificador de
    Inteligência (mínimo de 1 dia). A infusão também desaparecerá se você desistir
    de seu conhecimento na infusão para escolher outra.
  </p>
  <p>
    Você pode infundir mais de um item não-mágico ao final de um descanso longo:
    o número máximo de objetos aparece na coluna <strong>Itens Infusos</strong> na tabela
    do Artífice. Você deve tocar cada um dos objetos e cada uma de suas infusões deve
    ser em um único objeto por vez. Se você tentar exceder o número máximo de infusões,
    a infusão mais antiga imediatamente termina e a nova infusão será aplicada.
  </p>
</div>

<div class="section">
  <h2>Especialista Artífice</h2>

  <p>
    No 3º nível, você escolhe o tipo de especialista que será.
    Essa escolha concede
    características no 3º nível e novamente nos níveis
    5º, 9º e 15º.
  </p>
</div>

<div class="section">
  <h2>Ferramenta Certa para o Trabalho</h2>

  <p>
    No <strong>3º nível</strong>, você aprende a produzir exatamente a ferramenta que precisa:
    com um kit de funileiro ou ferramentas de ladrão em mãos, você pode magicamente criar
    um tipo de ferramenta de artesão em um espaço desocupado a até <strong>1,5m</strong> de você.
  </p>

  <p>
    Essa criação requer <strong>uma hora de trabalho não interrompido</strong>, que pode coincidir
    com um descanso curto ou longo. Apesar de ser produzido com magia, as ferramentas
    <strong>não são mágicas</strong> e desaparecem se você usar essa habilidade novamente.
  </p>
</div>

<div class="section">
  <h2>Incremento no Valor de Habilidade</h2>

  <p>
    Quando você atinge o <strong>4º nível</strong>, e novamente no
    <strong>8º, 12º, 16º e 19º níveis</strong>, você pode aumentar
    seus valores de habilidade.
  </p>

  <p>
    Você pode escolher uma das opções abaixo:
  </p>

  <ul class="bullet-list">
    <li>
      Aumentar <strong>um valor de habilidade</strong>, à sua escolha, em <strong>2</strong>;
    </li>
    <li>
      Aumentar <strong>dois valores de habilidade diferentes</strong>, à sua escolha, em <strong>1</strong> cada.
    </li>
  </ul>

  <p>
    Como padrão, você <strong>não pode elevar um valor de habilidade acima de 20</strong>
    usando essa característica.
  </p>
</div>

<div class="section">
  <h2>Especialização em Ferramentas</h2>

  <p>
    Começando no <strong>6º nível</strong>, seu bônus de proficiência é <strong>dobrado</strong>
    para qualquer teste que utilize sua proficiência com uma ferramenta.
  </p>
</div>

<div class="section">
  <h2>Centelha da Genialidade</h2>

  <p>
    No <strong>7º nível</strong>, você ganha a habilidade nata de pensar em soluções quando
    está sob pressão. Quando você ou uma criatura que você possa ver a até <strong>9m</strong> 
    de você fizer um teste de habilidade ou teste de resistência, você pode usar sua 
    reação e adicionar o seu <strong>modificador de Inteligência</strong> nessa rolagem.
  </p>

  <p>
    Você pode usar essa característica um número de vezes igual ao seu <strong>modificador de Inteligência</strong> 
    (mínimo de <strong>1</strong>). Você recupera todos os usos ao finalizar um <strong>descanso longo</strong>.
  </p>
</div>
<div class="section">
  <h2>Adepto de Itens Mágicos</h2>

  <p>
    Quando você alcança o <strong>10º nível</strong>, você conquista um profundo conhecimento
    de como usar ou criar itens mágicos:
  </p>

  <ul class="bullet-list">
    <li>Você pode se sintonizar com até <strong>4 itens mágicos</strong> de uma vez.</li>
    <li>Se você cria um item mágico de qualidade <strong>comum</strong> ou <strong>incomum</strong>, 
        leva apenas <strong>um quarto do tempo</strong> e custa apenas <strong>metade do ouro</strong> necessário.</li>
  </ul>
</div>

<div class="section">
  <h2>Item Armazenador de Magia</h2>

  <p>
    No <strong>11º nível</strong>, você aprende como armazenar uma magia em um objeto para uso repetitivo.
    Sempre que você finalizar um <strong>descanso longo</strong>, você pode tocar uma arma simples ou marcial
    ou um item que você pode usar como foco de conjuração para armazenar uma magia nele,
    escolhendo uma magia de <strong>1º ou 2º nível</strong> da <a href="../magias.html">lista de magias do artífice</a>
    que requer uma ação para ser conjurada (você não precisa ter a magia preparada).
  </p>

  <p>
    Com o objeto em mãos, uma criatura pode usar uma ação para produzir o efeito da magia contida nele,
    usando seu modificador de habilidade de conjuração. A magia permanece no objeto até que ele tenha sido utilizado
    um número de vezes igual ao <strong>dobro do seu modificador de Inteligência</strong> (mínimo de dois)
    ou até que você utilize essa habilidade novamente.
  </p>
</div>

<div class="section">
  <h2>Sábio dos Itens Mágicos</h2>

  <p>
    No <strong>14º nível</strong>, sua habilidade com itens mágicos se aprofunda ainda mais:
  </p>

  <ul class="bullet-list">
    <li>Você pode se sintonizar com até <strong>5 itens mágicos</strong> de uma vez.</li>
    <li>Você ignora todos os requisitos de <strong>classe, raça, magia e nível</strong> necessários para se sintonizar ou utilizar um item mágico.</li>
  </ul>
</div>

<div class="section">
  <h2>Mestre dos Itens Mágicos</h2>

  <p>
    No <strong>18º nível</strong>, você pode se sintonizar com até <strong>6 itens mágicos</strong> de uma vez.
  </p>
</div>

<div class="section">
  <h2>Alma do Artífice</h2>

  <p>
    No <strong>20º nível</strong>, você desenvolve uma conexão mística com seus itens mágicos, que pode usar para sua proteção:
  </p>

  <ul class="bullet-list">
    <li>Você recebe um <strong>bônus de +1</strong> para todos os testes de resistência por item mágico atualmente sintonizado com você.</li>
    <li>Se você for reduzido a <strong>0 pontos de vida</strong> mas não estiver completamente morto, você pode usar sua reação para terminar a sintonia com um item mágico, fazendo com que você caia para <strong>1 ponto de vida</strong> ao invés de 0.</li>
  </ul>
</div>

<div class="section">
  <h2 id="infusoes">Infusões do Artífice</h2>

  <p>
    A descrição das infusões seguintes detalham o tipo de item necessário, e também se o item resultante requer ou não sintonização.
  </p>
  <p>
    Algumas infusões requerem um nível mínimo de artífice. Você não pode aprender essas infusões até alcançar esse nível.
  </p>
  <p>
    A não ser que uma infusão diga o contrário, você não pode aprender uma infusão mais de uma vez.
  </p>

  <h3>Armadura de Propulsor Arcano</h3>
  <p class="infusion-info"><em>Pré-requisito:</em> 14º nível de artífice</p>
  <p class="infusion-info"><em>Item:</em> Armadura (requer sintonização)</p>
  <p>O portador da armadura ganha estes benefícios:</p>
  <p>A velocidade de caminhada do usuário aumenta em 1,5 m.</p>
  <p>A armadura inclui manoplas, cada uma das quais é uma arma mágica que pode ser empunhada somente quando a mão não está segurando nada. O usuário é proficiente com as manoplas, e cada uma causa 1d8 de dano de energia em um golpe e tem a propriedade de arremesso, com alcance normal de 6 metros e alcance longo de 18 metros. Quando lançada, a manopla se desprende e voa no alvo do ataque, então retorna imediatamente ao usuário e se reconecta.</p>
  <p>A armadura não pode ser removida contra a vontade do usuário.</p>
  <p>Se o usuário tiver algum membro ausente, a armadura substitui esses membros - mãos, braços, pés, pernas ou apêndices semelhantes. As substituições funcionam de forma idêntica às peças do corpo que substituem.</p>

  <h3>Armadura de Força Mágica</h3>
  <p class="infusion-info"><em>Item:</em> Armadura (requer sintonização)</p>
  <p>Esta armadura possui 6 cargas. O usuário pode gastar as cargas da armadura das seguintes maneiras:</p>
  <p>Quando o usuário faz um teste de Força ou teste de resistência de Força, ele pode gastar 1 carga para adicionar um bônus ao teste igual ao seu modificador de Inteligência.</p>
  <p>Se a criatura fosse derrubada, ela pode usar sua reação para gastar 1 carga para evitar ser derrubada.</p>
  <p>A armadura recupera 1d6 cargas gastas diariamente ao amanhecer.</p>

  <h3>Botas do Caminho Rebobinado</h3>
  <p class="infusion-info"><em>Pré-requisito:</em> 6º nível de artífice</p>
  <p class="infusion-info"><em>Item:</em> Um par de botas (requer sintonização)</p>
  <p>Enquanto estiver vestindo essas botas, uma criatura poderá teleportar-se a até 4,5m com uma ação bônus para um espaço desocupado que a criatura pode ver. A criatura deve ter ocupado tal espaço em algum momento durante seu turno atual.</p>

  <h3>Foco Arcano Aprimorado</h3>
  <p class="infusion-info"><em>Item:</em> Um cetro, cajado, ou varinha (requer sintonização)</p>
  <p>Enquanto segura esse item, você recebe um bônus de +1 para rolagens de ataque de magia. Adicionalmente, você ignora meia-cobertura quando faz um ataque de magia.</p>
  <p>O bônus aumenta para +2 quando você atinge o 10º nível nessa classe.</p>

  <h3>Defesa Aprimorada</h3>
  <p class="infusion-info"><em>Item:</em> Armadura ou Escudo</p>
  <p>Uma criatura ganha +1 de bônus em sua Classe de Armadura enquanto estiver vestindo (armadura) ou portando (escudo) o item infundido.</p>
  <p>O bônus aumenta para +2 quando você alcançar o 10º nível nesta classe.</p>

  <h3>Armamento Aprimorado</h3>
  <p class="infusion-info"><em>Item:</em> Arma simples ou marcial</p>
  <p>Essa arma mágica garante +1 de bônus nas jogadas de ataque e dano feitos com ela.</p>
  <p>O bônus aumenta para +2 quando você alcançar o 10º nível nesta classe.</p>

  <h3>Elmo da Consciência</h3>
  <p>(Unearthed Arcana)</p>
  <p class="infusion-info"><em>Pré-requisito:</em> 10º de artífice</p>
  <p class="infusion-info"><em>Item:</em> Um elmo (requer sintonização)</p>
  <p>Enquanto vestindo este elmo, uma criatura possui vantagem em jogadas de iniciativa. Além disso, o portador não pode ser surpreso, portanto que ele não esteja incapacitado.</p>

  <h3>Servente Homúnculos</h3>
  <p class="infusion-info"><em>Item:</em> Uma gema com valor de pelo menos 100po</p>
  <p>Você aprende os delicados métodos de criar um homúnculos especial que serve você. O item que você infunde serve como a coração da criatura, e seu corpo é imediatamente gerado em torno do coração.</p>
  <p>Você determina a aparência do homúnculos. Alguns artífices preferem pássaros mecânicos, outros preferem frascos com asas ou miniaturas de caldeirões animados.</p>
  <p>O homúnculos é amigável com você e seus companheiros, e obedece aos seus comandos. Veja as estatísticas do jogo desta criatura no bloco dela, que usa o seu bônus de proficiência (BP) em vários lugares.</p>
  <p>Em combate, o homúnculos compartilha da sua contagem de iniciativa, mas age sempre depois de você. Ele pode se mover e usar reações normalmente, mas a única ação que pode usar no turno é Esquivar, a não ser que você tenha usado sua ação bônus para comandar ele a fazer uma de suas ações ou Disparada, Desengajar, Ajudar, Procurar e Esconder. Se você estiver incapacitado, o homúnculo pode realizar qualquer ação de sua escolha, não apenas Esquivar.</p>
  <p>Se a magia Consertar for conjurada no seu homúnculos, ele recupera 2d6 pontos de vida. Se ele morrer, ele desaparece, deixando para trás apenas seu coração.</p>

  <h3>Afiador de Mentes</h3>
  <p class="infusion-info"><em>Item:</em> Armadura ou roupa</p>
  <p>O item infundido pode enviar um choque para o usuário para refocar sua mente. Este item tem 4 cargas. Quando o usuário falha em um Teste de Resistência de Constituição para manter a concentração em uma magia, o usuário pode usar sua reação para gastar 1 das cargas do item para ter sucesso. O item recupera 1d4 cargas gastas diariamente ao amanhecer.</p>

  <h3>Arma Radiante</h3>
  <p class="infusion-info"><em>Pré-requisito:</em> 6º nível de artífice</p>
  <p class="infusion-info"><em>Item:</em> Uma arma simples ou marcial (requer sintonização)</p>
  <p>Essa arma mágica concede +1 nas jogadas de ataque e dano feitos com ela. Enquanto segurando-a, o portador pode usar uma ação bônus para fazer com que ela emita luz plana em um raio de 9m e penumbra em mais 9m. O portador pode extinguir a luz como uma ação bônus.</p>
  <p>A arma tem 4 cargas. Imediatamente após você ser atingido por um ataque corpo-a-corpo, você pode usar sua reação para fazer com que o atacante fique cego até o final do próximo turno do atacante, a menos que o atacante seja sucedido em um teste de resistência de Constituição contra a CD de suas magias. A arma recupera 1d4 cargas no começo de cada dia.</p>

  <h3>Tiro Repetitivo</h3>
  <p class="infusion-info"><em>Item:</em> Uma arma simples ou marcial com a propriedade Munição (requer sintonização)</p>
  <p>Essa arma mágica concede um bônus de +1 nas jogadas de ataque e dano feitos com ela quando for usada para realizar um ataque à distância e ignora a propriedade recarga, se ela possuir.</p>
  <p>A arma não requer munição: ela magicamente produz uma peça de munição toda vez que você for realizar uma jogada de ataque à distância com ela, a menos que você recarregue-a manualmente. A munição produzida pela arma desaparece no instante após você acertar ou errar um alvo.</p>
</div>

const toggleWrapper = document.querySelector(".toggle-wrapper");

let isAnimating = false;

/* anima toggle (só uma vez) */
function animateToggle() {
  toggleWrapper.classList.remove("animate-in");
  void toggleWrapper.offsetHeight;
  toggleWrapper.classList.add("animate-in");
}

/* anima card */
function animateCardIn() {
  content.classList.add("animate-in");
}

function animateCardOut(callback) {
  content.classList.remove("animate-in");
  setTimeout(callback, 100);
}

/* troca de conteúdo com lock */
function swapContent(html, is5e) {
  if (isAnimating) return;

  // evita reanimar se já estiver ativo
  if (
    (is5e && btn5e.classList.contains("active")) ||
    (!is5e && btnOne.classList.contains("active"))
  ) {
    return;
  }

  isAnimating = true;

  btn5e.classList.toggle("active", is5e);
  btnOne.classList.toggle("active", !is5e);

  animateCardOut(() => {
    content.innerHTML = html;

    void content.offsetHeight;

    animateCardIn();

    setTimeout(() => {
      isAnimating = false;
    }, 550); // duração da animação do card
  });
}

/* eventos */
btn5e.addEventListener("click", () => swapContent(artifice5e, true));
btnOne.addEventListener("click", () => swapContent(artificeOne, false));

/* carga inicial */
requestAnimationFrame(() => {
  animateToggle();
  content.innerHTML = artifice5e;
  animateCardIn();
  btn5e.classList.add("active");
});

document.getElementById("link-ancora").addEventListener("click", function(e){
  e.preventDefault(); // evita o comportamento padrão
  const destino = document.getElementById("destino");
  
  destino.scrollIntoView({
    behavior: "smooth", 
    block: "start"      
  });
});
</script>
