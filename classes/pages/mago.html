<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mago • D&D</title>

<style>
:root {
  --bg: #0f1115;
  --bg-soft: #181b22;
  --card: #1f2430;
  --border: #2c3240;
  --text: #e6e6eb;
  --muted: #9aa0b4;
  --accent: #5da9ff;
}

* { box-sizing: border-box; }

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, sans-serif;
}

/* BOTÃO VOLTAR */
.back-button {
  position: fixed;
  top: 18px;
  left: 18px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 2000;
}

.hero {
  position: relative;
  height: 520px; /* altura visual mínima */
  width: 100%;
  overflow: visible;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(15,17,21,0.15) 40%,
    var(--bg) 100%
  );
}

.hero-content {
  position: absolute;
  top: 250px; /* controla a altura visual que você quer */
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 1200px; /* card mais largo */
  padding: 0 16px;
  z-index: 5;
}

/* TOGGLE */
.toggle-wrapper {
  display: flex;
  justify-content: center;
  margin-bottom: 18px;
  opacity: 0;
  transform: translateY(-20px);
  transition:
    opacity 0.45s ease-out,
    transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
}

.toggle {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 999px;
  display: flex;
  padding: 6px;
  gap: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.toggle-wrapper.animate-in {
  opacity: 1;
  transform: translateY(0);
}

.toggle button {
  background: transparent;
  border: none;
  border-radius: 999px;
  padding: 8px 14px;
  cursor: pointer;
  opacity: 0.6;
}

.toggle button.active {
  background: white;
  opacity: 1;
}

.toggle img {
  height: 24px;
}

/* Ícone padrão (inativo) */
.toggle button img {
  filter: invert(0%) grayscale(0%);
  transition: filter 0.2s ease;
}

/* Ícone quando o botão está ativo (fundo branco) */
.toggle button.active img {
  filter: invert(100%) grayscale(100%);
}

.card {
  max-width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 34px;
  box-shadow: 0 30px 70px rgba(0,0,0,0.6);
  transition-delay: 0.08s;
  opacity: 0;
  transform: translateY(40px);
  transition:
    opacity 0.55s ease-out,
    transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
}

.card.animate-in {
  opacity: 1;
  transform: translateY(0);
}

/* CONTEÚDO */
.card h1 {
  text-align: center;
  font-size: 2.5rem;
  margin-top: 0;
}

.subtitle {
  text-align: center;
  color: var(--muted);
  margin-bottom: 34px;
}

/* SEÇÕES */
.section {
  margin-bottom: 30px;
}

.section h2 {
  font-size: 1.35rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  margin-bottom: 10px;
}

.section p {
  line-height: 1.65;
}

.table-wrapper {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
  min-width: 720px;
}

table tr.active-row{
  background: rgba(255, 255, 255, 0.08);
}

table tr{
  cursor: pointer;
  transition: background 0.25s ease;
}

@media (hover: hover) {
  table tr:hover{
    background: rgba(255, 255, 255, 0.04);
  }
}

th, td {
  border: 1px solid var(--border);
  padding: 10px;
  text-align: center;
}

th {
  background: var(--bg-soft);
}

.subclasse-container {
  display: flex;
  flex-wrap: wrap;
  grid-template-columns: repeat(auto-fit, 180px);
  gap: 20px;
  justify-content: center;
  margin: 20px auto 0;
}

.subclasse-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 0;
  width: 180px;
  overflow: hidden;
  cursor: pointer;
  text-align: center;
  color: var(--text);
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
}

.subclasse-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
  border-color: var(--accent);
}

.subclasse-card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  display: block;
}

.subclasse-card h3 {
  margin: 12px 0;
  font-size: 1rem;
}

main {
  max-width: 1100px;
  margin: auto;
  padding: 80px 16px;
  margin-top: 260px; /* espaço para o card crescer */
}

/* Links sutis destacados */
.section a{
  color: #9cd1ff;            /* cor base branca */
  font-weight: 600;          /* levemente negrito */
  text-decoration: none;
  position: relative;
  transition: color 0.3s ease;
}

/* Linha animada por baixo do link */
.section a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -2px;              /* espaçamento da linha */
  width: 0%;
  height: 2px;               /* espessura da linha */
  background: #5da9ff;       /* cor sutil da paleta (accent) */
  border-radius: 1px;        /* suaviza a linha */
  transition: width 0.3s ease;
}

/* Hover: anima a linha e muda levemente a cor */
.section a:hover {
  color: #dce6ff;            /* leve clareamento no hover */
}

.section a:hover::after {
  width: 100%;
}

@media (max-width: 600px) {
  .subclasse-container {
    gap: 14px;
  }

  .subclasse-card {
    width: calc(50% - 14px);
    max-width: 180px;
    border-radius: 12px;
  }

  .subclasse-card img {
    height: 110px;
  }

  .subclasse-card h3 {
    font-size: 0.9rem;
    margin: 8px 0;
  }
}
</style>
</head>

    Como mago, você pratica a magia por meio de <strong>estudo rigoroso, lógica e disciplina</strong>.

  <p>
    No <strong>1º nível</strong>, você conhece três truques de sua escolha presentes na

  </p>
  <p>

    que conhece por outro truque da
    <a href="../magias.html">Lista de Magias de Mago</a>.
  </p>

  <h3>Livro de Magias</h3>
  <p>
    No 1º nível, você possui um <strong>grimório</strong> contendo seis magias de 1º nível
    de sua escolha da
    <a href="../magias.html">Lista de Magias de Mago</a>.
    Seu grimório é o repositório de todo o conhecimento arcano que você acumulou,
    registrando fórmulas, símbolos e anotações necessárias para conjurar suas magias.
  </p>
  <p>
    Sempre que você ganhar um nível de Mago, pode adicionar duas magias de Mago
    de um nível para o qual possua espaços de magia ao seu grimório.
    Você também pode adicionar magias encontradas em pergaminhos ou livros de outros
    magos, conforme descrito nas regras de conjuração.
  </p>

  <h3>Preparando e Conjurando Magias</h3>
  <p>
    A tabela do Mago mostra quantos espaços de magia você possui para conjurar suas
    magias de 1º nível ou superior. Para conjurar uma dessas magias,
    você deve gastar um espaço de magia do nível da magia ou superior.
    Você recupera todos os espaços de magia gastos ao concluir um descanso longo.
  </p>
  <p>
    Diferente de feiticeiros, você <strong>prepara</strong> uma lista de magias de Mago
    a partir de seu grimório. O número de magias que você pode preparar é igual
    ao seu modificador de Inteligência + seu nível de Mago (mínimo de uma magia).
    Você pode alterar sua lista de magias preparadas ao final de um descanso longo.
  </p>

  <h3>Habilidade de Conjuração</h3>
  <p>
    Inteligência é sua habilidade de conjuração para as magias de Mago:
    seu conhecimento, memória e capacidade de análise determinam
    o quão eficazmente você manipula a energia arcana.
    Você usa seu modificador de Inteligência sempre que uma magia de Mago
    se referir à sua habilidade de conjuração.
    Além disso, você usa seu modificador de Inteligência ao definir a CD dos testes
    de resistência para suas magias de Mago e ao realizar jogadas de ataque com magia.
  </p>
  <p>
    <strong>CD de teste de resistência</strong> = 8 + seu bônus de proficiência + seu modificador de Inteligência
  </p>
  <p>
    <strong>Modificador de ataque de magia</strong> = seu bônus de proficiência + seu modificador de Inteligência
  </p>

  <h3>Foco de Conjuração</h3>
  <p>
    Você pode usar um <strong>foco arcano</strong> (encontrado no capítulo 5)
    como foco de conjuração para suas magias de Mago.

const toggleWrapper = document.querySelector(".toggle-wrapper");

let isAnimating = false;

/* anima toggle (só uma vez) */
function animateToggle() {
  toggleWrapper.classList.remove("animate-in");
  void toggleWrapper.offsetHeight;
  toggleWrapper.classList.add("animate-in");
}

/* anima card */
function animateCardIn() {
  content.classList.add("animate-in");
}

function animateCardOut(callback) {
  content.classList.remove("animate-in");
  setTimeout(callback, 100);
}

/* troca de conteúdo com lock */
function swapContent(html, is5e) {
  if (isAnimating) return;

  // evita reanimar se já estiver ativo
  if (
    (is5e && btn5e.classList.contains("active")) ||
    (!is5e && btnOne.classList.contains("active"))
  ) {
    return;
  }

  isAnimating = true;

  btn5e.classList.toggle("active", is5e);
  btnOne.classList.toggle("active", !is5e);

  animateCardOut(() => {
    content.innerHTML = html;

    void content.offsetHeight;

    animateCardIn();

    setTimeout(() => {
      isAnimating = false;
    }, 550); // duração da animação do card
  });
}

/* eventos */
btn5e.addEventListener("click", () => swapContent(mago5e, true));
btnOne.addEventListener("click", () => swapContent(magoOne, false));

/* carga inicial */
requestAnimationFrame(() => {
  animateToggle();
  content.innerHTML = mago5e;
  animateCardIn();
  btn5e.classList.add("active");
});
</script>
