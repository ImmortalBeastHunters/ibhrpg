<style>
:root {
  --bg: #0f1115;
  --bg-soft: #181b22;
  --card: #1f2430;
  --border: #2c3240;
  --text: #e6e6eb;
  --muted: #9aa0b4;
  --accent: #5da9ff;
}

* { box-sizing: border-box; }

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, sans-serif;
}

/* BOTÃO VOLTAR */
.back-button {
  position: fixed;
  top: 18px;
  left: 18px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 2000;
}

.hero {
  position: relative;
  height: 520px; /* altura visual mínima */
  width: 100%;
  overflow: visible;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(15,17,21,0.15) 40%,
    var(--bg) 100%
  );
}

.hero-content {
  position: absolute;
  top: 250px; /* controla a altura visual que você quer */
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 1200px; /* card mais largo */
  padding: 0 16px;
  z-index: 5;
}

/* TOGGLE */
.toggle-wrapper {
  display: flex;
  justify-content: center;
  margin-bottom: 18px;
  opacity: 0;
  transform: translateY(-20px);
  transition:
    opacity 0.45s ease-out,
    transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
}

.toggle {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 999px;
  display: flex;
  padding: 6px;
  gap: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.toggle-wrapper.animate-in {
  opacity: 1;
  transform: translateY(0);
}

.toggle button {
  background: transparent;
  border: none;
  border-radius: 999px;
  padding: 8px 14px;
  cursor: pointer;
  opacity: 0.6;
}

.toggle button.active {
  background: white;
  opacity: 1;
}

.toggle img {
  height: 24px;
}

/* Ícone padrão (inativo) */
.toggle button img {
  filter: invert(0%) grayscale(0%);
  transition: filter 0.2s ease;
}

/* Ícone quando o botão está ativo (fundo branco) */
.toggle button.active img {
  filter: invert(100%) grayscale(100%);
}

.card {
  max-width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 34px;
  box-shadow: 0 30px 70px rgba(0,0,0,0.6);
  transition-delay: 0.08s;
  opacity: 0;
  transform: translateY(40px);
  transition:
    opacity 0.55s ease-out,
    transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
}

.card.animate-in {
  opacity: 1;
  transform: translateY(0);
}

/* CONTEÚDO */
.card h1 {
  text-align: center;
  font-size: 2.5rem;
  margin-top: 0;
}

.subtitle {
  text-align: center;
  color: var(--muted);
  margin-bottom: 34px;
}

/* SEÇÕES */
.section {
  margin-bottom: 30px;
}

.section h2 {
  font-size: 1.35rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  margin-bottom: 10px;
}

.section p {
  line-height: 1.65;
}

.table-wrapper {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
  min-width: 720px;
}

table tr.active-row{
  background: rgba(255, 255, 255, 0.08);
}

table tr{
  cursor: pointer;
  transition: background 0.25s ease;
}

@media (hover: hover) {
  table tr:hover{
    background: rgba(255, 255, 255, 0.04);
  }
}

th, td {
  border: 1px solid var(--border);
  padding: 10px;
  text-align: center;
}

th {
  background: var(--bg-soft);
}

.subclasse-container {
  display: flex;
  flex-wrap: wrap;
  grid-template-columns: repeat(auto-fit, 180px);
  gap: 20px;
  justify-content: center;
  margin: 20px auto 0;
}

.subclasse-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 0;
  width: 180px;
  overflow: hidden;
  cursor: pointer;
  text-align: center;
  color: var(--text);
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
}

.subclasse-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
  border-color: var(--accent);
}

.subclasse-card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  display: block;
}

.subclasse-card h3 {
  margin: 12px 0;
  font-size: 1rem;
}

main {
  max-width: 1100px;
  margin: auto;
  padding: 80px 16px;
  margin-top: 260px; /* espaço para o card crescer */
}

/* Links sutis destacados */
.section a{
  color: #9cd1ff;            /* cor base branca */
  font-weight: 600;          /* levemente negrito */
  text-decoration: none;
  position: relative;
  transition: color 0.3s ease;
}

/* Linha animada por baixo do link */
.section a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -2px;              /* espaçamento da linha */
  width: 0%;
  height: 2px;               /* espessura da linha */
  background: #5da9ff;       /* cor sutil da paleta (accent) */
  border-radius: 1px;        /* suaviza a linha */
  transition: width 0.3s ease;
}

/* Hover: anima a linha e muda levemente a cor */
.section a:hover {
  color: #dce6ff;            /* leve clareamento no hover */
}

.section a:hover::after {
  width: 100%;
}

@media (max-width: 600px) {
  .subclasse-container {
    gap: 14px;
  }

  .subclasse-card {
    width: calc(50% - 14px);
    max-width: 180px;
    border-radius: 12px;
  }

  .subclasse-card img {
    height: 110px;
  }

  .subclasse-card h3 {
    font-size: 0.9rem;
    margin: 8px 0;
  }
}
</style>
</head>

    recebe <strong>vantagem no próximo teste de ataque</strong> que realizar
    durante o turno atual.
  </p>

  <p>
    Você só pode usar essa ação bônus se <strong>não tiver se movido</strong>

<div class="section">
  <h2>Incremento no Valor de Habilidade</h2>

  <p>
    Quando você atinge o <strong>4º nível</strong>, e novamente no
    <strong>8º, 12º, 16º e 19º níveis</strong>, você pode aumentar
    seus valores de habilidade.
  </p>

  <p>
    Você pode escolher uma das opções abaixo:
  </p>

  <ul class="bullet-list">
    <li>
      Aumentar <strong>um valor de habilidade</strong>, à sua escolha, em <strong>2</strong>;
    </li>
    <li>
      Aumentar <strong>dois valores de habilidade diferentes</strong>, à sua escolha, em <strong>1</strong> cada.
    </li>
  </ul>

  <p>
    Como padrão, você <strong>não pode elevar um valor de habilidade acima de 20</strong>
    usando essa característica.
  </p>
</div>

<div class="section">
  <h2>Esquiva Sobrenatural</h2>

  <p>
    A partir do <strong>5º nível</strong>, quando um inimigo que você possa ver
    o acertar com um ataque, você pode usar sua <strong>reação</strong> para
    reduzir pela metade o dano sofrido.
  </p>
</div>

<div class="section">

  <p>
    A partir do <strong>7º nível</strong>, você pode se esquivar agilmente de
    certos efeitos em área, como o sopro flamejante de um dragão vermelho ou
    a magia <em>tempestade de gelo</em>.
  </p>

  <p>
    Quando você for alvo de um efeito que exija um
    <strong>teste de resistência de Destreza</strong> para sofrer metade do
    dano, você <strong>não sofre dano algum</strong> se obtiver sucesso e sofre
    <strong>apenas metade do dano</strong> se falhar.
  </p>
</div>

<div class="section">
  <h2>Talento Confiável</h2>

  <p>
    No <strong>11º nível</strong>, você refinou suas perícias a um nível que
    beira a perfeição. Sempre que você fizer um
    <strong>teste de habilidade</strong> no qual possa adicionar seu
    <strong>bônus de proficiência</strong>, você trata qualquer resultado
    no <strong>d20 de 9 ou menor como um 10</strong>.
  </p>
</div>

<div class="section">
  <h2>Sentido Cego</h2>

  <p>
    No <strong>14º nível</strong>, desde que você seja capaz de
    <strong>ouvir</strong>, você fica ciente da localização de qualquer
    criatura <strong>escondida ou invisível</strong> a até
    <strong>3 metros</strong> de você.
  </p>
</div>

<div class="section">
  <h2>Mente Escorregadia</h2>

  <p>
    No <strong>15º nível</strong>, você desenvolve uma força de vontade
    excepcional, adquirindo <strong>proficiência nos testes de resistência
    de Sabedoria</strong>.
  </p>
</div>

<div class="section">
  <h2>Elusivo</h2>

  <p>
    A partir do <strong>18º nível</strong>, você se torna tão sagaz que

    <strong>jogada de ataque</strong> tem <strong>vantagem</strong> contra você,

  </p>
</div>

<div class="section">

const toggleWrapper = document.querySelector(".toggle-wrapper");

let isAnimating = false;

/* anima toggle (só uma vez) */
function animateToggle() {
  toggleWrapper.classList.remove("animate-in");
  void toggleWrapper.offsetHeight;
  toggleWrapper.classList.add("animate-in");
}

/* anima card */
function animateCardIn() {
  content.classList.add("animate-in");
}

function animateCardOut(callback) {
  content.classList.remove("animate-in");
  setTimeout(callback, 100);
}

/* troca de conteúdo com lock */
function swapContent(html, is5e) {
  if (isAnimating) return;

  // evita reanimar se já estiver ativo
  if (
    (is5e && btn5e.classList.contains("active")) ||
    (!is5e && btnOne.classList.contains("active"))
  ) {
    return;
  }

  isAnimating = true;

  btn5e.classList.toggle("active", is5e);
  btnOne.classList.toggle("active", !is5e);

  animateCardOut(() => {
    content.innerHTML = html;

    void content.offsetHeight;

    animateCardIn();

    setTimeout(() => {
      isAnimating = false;
    }, 550); // duração da animação do card
  });
}

/* eventos */
btn5e.addEventListener("click", () => swapContent(ladino5e, true));
btnOne.addEventListener("click", () => swapContent(ladinoOne, false));

/* carga inicial */
requestAnimationFrame(() => {
  animateToggle();
  content.innerHTML = ladino5e;
  animateCardIn();
  btn5e.classList.add("active");
});
</script>
