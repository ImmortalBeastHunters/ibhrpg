<title>Bruxo • D&D</title>

<style>
:root {
  --bg: #0f1115;
  --bg-soft: #181b22;
  --card: #1f2430;
  --border: #2c3240;
  --text: #e6e6eb;
  --muted: #9aa0b4;
  --accent: #5da9ff;
}

* { box-sizing: border-box; }

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, sans-serif;
}

/* BOTÃO VOLTAR */
.back-button {
  position: fixed;
  top: 18px;
  left: 18px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 2000;
}

.hero {
  position: relative;
  height: 520px; /* altura visual mínima */
  width: 100%;
  overflow: visible;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(15,17,21,0.15) 40%,
    var(--bg) 100%
  );
}

.hero-content {
  position: absolute;
  top: 250px; /* controla a altura visual que você quer */
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 1200px; /* card mais largo */
  padding: 0 16px;
  z-index: 5;
}

/* TOGGLE */
.toggle-wrapper {
  display: flex;
  justify-content: center;
  margin-bottom: 18px;
  opacity: 0;
  transform: translateY(-20px);
  transition:
    opacity 0.45s ease-out,
    transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
}

.toggle {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 999px;
  display: flex;
  padding: 6px;
  gap: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.toggle-wrapper.animate-in {
  opacity: 1;
  transform: translateY(0);
}

.toggle button {
  background: transparent;
  border: none;
  border-radius: 999px;
  padding: 8px 14px;
  cursor: pointer;
  opacity: 0.6;
}

.toggle button.active {
  background: white;
  opacity: 1;
}

.toggle img {
  height: 24px;
}

/* Ícone padrão (inativo) */
.toggle button img {
  filter: invert(0%) grayscale(0%);
  transition: filter 0.2s ease;
}

/* Ícone quando o botão está ativo (fundo branco) */
.toggle button.active img {
  filter: invert(100%) grayscale(100%);
}

.card {
  max-width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 34px;
  box-shadow: 0 30px 70px rgba(0,0,0,0.6);
  transition-delay: 0.08s;
  opacity: 0;
  transform: translateY(40px);
  transition:
    opacity 0.55s ease-out,
    transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
}

.card.animate-in {
  opacity: 1;
  transform: translateY(0);
}

/* CONTEÚDO */
.card h1 {
  text-align: center;
  font-size: 2.5rem;
  margin-top: 0;
}

.subtitle {
  text-align: center;
  color: var(--muted);
  margin-bottom: 34px;
}

/* SEÇÕES */
.section {
  margin-bottom: 30px;
}

.section h2 {
  font-size: 1.35rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  margin-bottom: 10px;
}

.section p {
  line-height: 1.65;
}

.table-wrapper {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
  min-width: 720px;
}

table tr.active-row{
  background: rgba(255, 255, 255, 0.08);
}

table tr{
  cursor: pointer;
  transition: background 0.25s ease;
}

@media (hover: hover) {
  table tr:hover{
    background: rgba(255, 255, 255, 0.04);
  }
}

th, td {
  border: 1px solid var(--border);
  padding: 10px;
  text-align: center;
}

th {
  background: var(--bg-soft);
}

.subclasse-container {
  display: flex;
  flex-wrap: wrap;
  grid-template-columns: repeat(auto-fit, 180px);
  gap: 20px;
  justify-content: center;
  margin: 20px auto 0;
}

.subclasse-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 0;
  width: 180px;
  overflow: hidden;
  cursor: pointer;
  text-align: center;
  color: var(--text);
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
}

.subclasse-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
  border-color: var(--accent);
}

.subclasse-card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  display: block;
}

.subclasse-card h3 {
  margin: 12px 0;
  font-size: 1rem;
}

main {
  max-width: 1100px;
  margin: auto;
  padding: 80px 16px;
  margin-top: 260px; /* espaço para o card crescer */
}

/* Links sutis destacados */
.section a{
  color: #9cd1ff;            /* cor base branca */
  font-weight: 600;          /* levemente negrito */
  text-decoration: none;
  position: relative;
  transition: color 0.3s ease;
}

/* Linha animada por baixo do link */
.section a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -2px;              /* espaçamento da linha */
  width: 0%;
  height: 2px;               /* espessura da linha */
  background: #5da9ff;       /* cor sutil da paleta (accent) */
  border-radius: 1px;        /* suaviza a linha */
  transition: width 0.3s ease;
}

/* Hover: anima a linha e muda levemente a cor */
.section a:hover {
  color: #dce6ff;            /* leve clareamento no hover */
}

.section a:hover::after {
  width: 100%;
}

@media (max-width: 600px) {
  .subclasse-container {
    gap: 14px;
  }

  .subclasse-card {
    width: calc(50% - 14px);
    max-width: 180px;
    border-radius: 12px;
  }

  .subclasse-card img {
    height: 110px;
  }

  .subclasse-card h3 {
    font-size: 0.9rem;
    margin: 8px 0;
  }
}
</style>

      pode ser uma figura, texto de até 25 palavras, linhas e formas ou uma mistura destes elementos,
      como você quiser.
    </li>
  </ul>

  <p>
    A propriedade escolhida dura infinitamente. Como uma ação, você pode tocar
    o objeto e encerrar a propriedade prematuramente.
  </p>

  <p>
    Você pode conceder a magia dessa habilidade para múltiplos objetos, tocando
    um objeto cada vez que você utiliza essa habilidade e um único objeto pode
    carregar apenas uma única propriedade de uma vez. O número máximo de objetos
    que você pode afetar com essa habilidade em uma única vez é igual ao seu
    modificador de Inteligência (mínimo de 1 objeto). Se você tentar exceder este máximo,
    a propriedade mais antiga se encerra imediatamente e a nova propriedade se aplica.
  </p>
</div>

<div class="section">
  <h2>Magia de Pacto</h2>

  <p>
    Sua pesquisa arcana e a magia concedida pelo seu patrono deram a você
    facilidade com magias.
  </p>

  <h3>Truques</h3>
  <p>
    No <strong>1º nível</strong>, você conhece dois truques de sua escolha
    da <a href="../magias.html">Lista de Magias de Bruxo</a>. Em níveis
    superiores, você aprende truques adicionais da lista de bruxo, como
    mostrado na coluna <a href="../magias.html">Truques Conhecidos</a> na tabela
    do Bruxo.
  </p>
  <p>
    Quando você ganhar um nível nesta classe, pode substituir um de seus
    truques de bruxo conhecidos por outro truque da <a href="../magias.html">Lista de Magias de Bruxo</a>.
  </p>

  <h3>Espaços de Magia</h3>
  <p>
    A tabela do Bruxo mostra quantos espaços de magia você possui para
    conjurar suas magias de 1º ao 5º nível. Todos os seus espaços de magia
    são do mesmo nível. Para conjurar uma de suas magias de bruxo de 1º nível
    ou superior, você deve gastar um espaço de magia. Você recupera todos os
    espaços de magia gastos quando finaliza um descanso curto ou longo.
  </p>
  <p>
    Por exemplo, ao atingir o <strong>5º nível</strong>, você possui dois
    espaços de magia de 3º nível. Para conjurar a magia de 1º nível
    <em>raio do bruxo</em>, você gasta um desses espaços e a conjura
    como se fosse de 3º nível.
  </p>

  <h3>Magias Conhecidas de 1º Nível ou Superior</h3>
  <p>
    No <strong>1º nível</strong>, você conhece duas magias de 1º nível de sua
    escolha da <a href="../magias.html">Lista de Magias de Bruxo</a>.
  </p>
  <p>
    A coluna <a href="../magias.html">Magias Conhecidas</a> na tabela do Bruxo
    indica quando você aprende novas magias de bruxo de 1º nível ou superior.
    Uma magia escolhida deve ter nível igual ou inferior ao nível do espaço de
    magia mostrado na tabela para o seu nível. Ao atingir o 6º nível, por exemplo,
    você aprende uma nova magia de bruxo, que pode ser de 1º, 2º ou 3º nível.
  </p>
  <p>
    Além disso, sempre que você ganha um nível nesta classe, pode substituir
    uma magia de bruxo que conhece por outra magia da <a href="../magias.html">Lista de Magias de Bruxo</a>,
    que também deve ser de um nível para o qual você possua espaços de magia.
  </p>

  <h3>Habilidade de Conjuração</h3>
  <p>
    Carisma é a sua habilidade de conjuração para suas magias de bruxo.
    Você usa seu modificador de Carisma sempre que uma magia de bruxo referir-se
    à sua habilidade de conjuração. Além disso, aplica-se seu modificador de
    Carisma ao determinar a CD dos testes de resistência para suas magias
    e ao fazer jogadas de ataque com magias.
  </p>
  <p>
    <strong>CD de teste de resistência</strong> = 8 + seu bônus de proficiência + seu modificador de Carisma
  </p>
  <p>
    <strong>Modificador de ataque de magia</strong> = seu bônus de proficiência + seu modificador de Carisma
  </p>

  <h3>Foco de Conjuração</h3>
  <p>
    Você pode usar um foco arcano fornecido pelo seu patrono como componente
    para conjurar suas magias de bruxo.
  </p>
</div>

<div class="section">
  <h2>Invocações Místicas</h2>

  <p>
    Durante seus estudos sobre conhecimento oculto, você descobriu as
    <strong>invocações místicas</strong>, fragmentos de conhecimento proibido
    que infundiram você com habilidade mágica permanente.
  </p>

  <p>
    No <strong>2º nível</strong>, você ganha duas invocações místicas à sua
    escolha. Suas opções de invocação estão detalhadas no final da descrição
    desta classe. Quando você atinge certos níveis de bruxo, adquire novas
    invocações à sua escolha, como mostrado na coluna
    <a href="#invocacoes">Invocações Conhecidas</a> na tabela do Bruxo.
  </p>

  <p>
    Além disso, sempre que você ganha um nível nesta classe, pode escolher
    uma invocação que já conhece e substituí-la por outra invocação que
    você possa aprender naquele nível.
  </p>
</div>

<div class="section">
  <h2>Dádiva do Pacto</h2>

  <p>
    No <strong>3º nível</strong>, seu patrono transcendental lhe confere um dom
    por seus leais serviços. Você adquire uma das características a seguir,
    à sua escolha.
  </p>

  <h3>Pacto da Corrente</h3>
  <p>
    Você aprende a magia <strong>Convocar Familiar</strong> e pode conjurá-la
    como um ritual. Essa magia não conta no número de magias que você conhece.
  </p>
  <p>
    Quando você conjura essa magia, pode escolher uma das formas convencionais
    para o seu familiar ou uma das seguintes formas especiais: diabrete,
    pseudodragão, quasit ou sprite.
  </p>
  <p>
    Além disso, quando você realiza a ação de <strong>Ataque</strong>, pode
    renunciar a um de seus ataques para permitir que seu familiar realize
    um ataque usando a reação dele.
  </p>

  <h3>Pacto da Lâmina</h3>
  <p>
    Você pode usar sua ação para criar uma <strong>arma de pacto</strong>
    em sua mão vazia. Você escolhe a forma da arma corpo-a-corpo cada vez que
    a cria (veja as opções de arma no Capítulo 5). Você é proficiente com ela
    enquanto a empunhar. A arma conta como mágica para ultrapassar resistência
    e imunidade a ataques e danos não-mágicos.
  </p>
  <p>
    Sua arma de pacto desaparece se estiver a mais de 1,5 metro de você por
    1 minuto ou mais. Ela também desaparece se você usar esta característica
    novamente, dissipar a arma (não requer ação) ou se você morrer.
  </p>
  <p>
    Você pode transformar uma arma mágica em sua arma de pacto ao realizar
    um ritual especial de 1 hora enquanto a empunha. O ritual pode ser
    realizado durante um descanso curto. Você pode dissipar a arma,
    guardando-a em um espaço extradimensional, e ela reaparece toda vez
    que você criar sua arma de pacto.
  </p>
  <p>
    A arma deixa de ser sua arma de pacto se você morrer, realizar um ritual
    de 1 hora com outra arma diferente ou realizar um ritual de 1 hora para
    romper seu elo com ela. A arma aparece aos seus pés se estiver no espaço
    extradimensional quando o elo for quebrado.
  </p>

  <h3>Pacto do Tomo</h3>
  <p>
    Seu patrono lhe deu um grimório chamado <strong>Livro das Sombras</strong>.
    Quando você adquire esta característica, escolha três truques da lista
    de magias de qualquer classe. Enquanto o livro estiver com você, poderá
    conjurar esses truques à vontade. Eles não contam no número de truques
    que você conhece e são considerados magias de bruxo para você.
  </p>
  <p>
    Se você perder seu Livro das Sombras, pode realizar uma cerimônia de 1 hora
    para receber um substituto do seu patrono. A cerimônia pode ser realizada
    durante um descanso curto ou longo e destrói o livro anterior. O livro se
    torna cinzas quando você morre.
  </p>
</div>

<div class="section">
  <h2>Incremento no Valor de Habilidade</h2>

  <p>
    Quando você atinge o <strong>4º nível</strong>, e novamente no
    <strong>8º, 12º, 16º e 19º níveis</strong>, você pode aumentar
    seus valores de habilidade.
  </p>

  <p>
    Você pode escolher uma das opções abaixo:
  </p>

  <ul class="bullet-list">
    <li>
      Aumentar <strong>um valor de habilidade</strong>, à sua escolha, em <strong>2</strong>;
    </li>
    <li>
      Aumentar <strong>dois valores de habilidade diferentes</strong>, à sua escolha, em <strong>1</strong> cada.
    </li>
  </ul>

  <p>
    Como padrão, você <strong>não pode elevar um valor de habilidade acima de 20</strong>
    usando essa característica.
  </p>
</div>

<div class="section">
  <h2>Arcana Mística</h2>

  <p>
    No <strong>11º nível</strong>, seu patrono confere a você um segredo mágico
    conhecido como <strong>arcana</strong>. Escolha uma magia de <strong>6º nível</strong>
    da <a href="../magias.html">Lista de Magias de Bruxo</a> como sua arcana.
  </p>
  <p>
    Você pode conjurar essa magia arcana uma vez sem gastar um espaço de magia.
    Você deve terminar um descanso longo antes de poder fazer isso novamente.
  </p>
  <p>
    Em níveis mais altos, você adquire mais magias de bruxo de sua escolha que
    podem ser conjuradas dessa forma: uma magia de <strong>7º nível</strong> no
    13º nível, uma magia de <strong>8º nível</strong> no 15º nível e uma magia
    de <strong>9º nível</strong> no 17º nível.
  </p>
  <p>
    Você recupera todos os usos de sua <strong>Arcana Mística</strong> quando
    termina um descanso longo.
  </p>
</div>

<div class="section">
  <h2>Mestre Místico</h2>

  <p>
    No <strong>20º nível</strong>, você pode recarregar sua reserva interior de
    poder místico suplicando ao seu patrono para recuperar espaços de magia gastos.
  </p>
  <p>
    Você pode gastar <strong>1 minuto</strong> suplicando pela ajuda do seu patrono
    para recuperar todos os espaços de magia gastos da sua característica
    <strong>Magia de Pacto</strong>. Uma vez que você recuperou espaços de magia
    com essa característica, você deve terminar um descanso longo antes de poder
    fazê-lo novamente.
  </p>
</div>

<div class="section">
  <h2 id="invocacoes">Invocações Místicas</h2>

  <p>
    Se uma invocação mística tiver pré-requisitos, você deve possuí-los para que
    possa aprendê-la. Você pode aprender a invocação ao mesmo tempo que adquire
    os pré-requisitos dela. O pré-requisito de nível nas invocações se refere ao
    nível de bruxo, não ao nível de personagem.
  </p>

  <h3>Armadura de Sombras</h3>
  <p class="invocation-info"><em>Pré-requisito:</em> 15º nível, característica Corrente de Cárceri</p>
  <p>Você pode conjurar <strong>armadura arcana</strong> em si mesmo, à vontade,
    sem precisar gastar um espaço de magia ou componentes materiais.</p>
  <p>Você também pode conjurar <strong>imobilizar monstro</strong> à vontade – tendo
    como alvo um celestial, corruptor ou elemental – sem gastar espaço de magia ou
    componentes materiais. Deve terminar um descanso longo antes de usar essa
    invocação na mesma criatura novamente.</p>

  <h3>Encharcar a Mente</h3>
  <p class="invocation-info"><em>Pré-requisito:</em> 5º nível</p>
  <p>Você pode conjurar <strong>lentidão</strong> uma vez, usando um espaço de magia
    de bruxo. Você não pode fazer isso novamente até terminar um descanso longo.</p>

  <p class="invocation-info"><em>Pré-requisito:</em> 7º nível</p>
  <p>Você pode conjurar <strong>metamorfose</strong> uma vez, usando um espaço de

  <h3>Máscara das Muitas Faces</h3>
  <p>Você pode conjurar <strong>disfarçar-se</strong> à vontade, sem precisar gastar um espaço de magia.</p>

  <p>Você pode conjurar <strong>alterar-se</strong> à vontade, sem precisar gastar um espaço de magia.</p>

  <p>Você pode conjurar <strong>confusão</strong> uma vez, usando um espaço de magia de bruxo. Não pode fazê-lo novamente até terminar um descanso longo.</p>

  <p>Você pode conjurar <strong>levitação</strong> em si mesmo, à vontade, sem gastar espaço de magia ou componentes materiais.</p>

  <p>Você pode conjurar <strong>salto</strong> em si mesmo, à vontade, sem gastar espaço de magia ou componentes materiais.</p>

  <h3>Sinal de Mau Agouro</h3>
  <p class="invocation-info"><em>Pré-requisito:</em> 5º nível</p>
  <p>Você pode conjurar <strong>rogar maldição</strong> uma vez, usando um espaço de magia de bruxo. Não pode fazê-lo novamente até terminar um descanso longo.</p>

  <h3>Sorvedor de Vida</h3>
  <p class="invocation-info"><em>Pré-requisito:</em> 12º nível, característica <strong>Pacto da Lâmina</strong></p>
  <p>Quando você atingir uma criatura com sua arma do pacto, ela sofre dano necrótico adicional igual ao seu modificador de Carisma (mínimo 1).</p>

  <h3>Sussurros da Sepultura</h3>
  <p class="invocation-info"><em>Pré-requisito:</em> 9º nível</p>
  <p>Você pode conjurar <strong>falar com os mortos</strong> à vontade, sem gastar espaço de magia.</p>

  <h3>Sussurros Sedutores</h3>
  <p class="invocation-info"><em>Pré-requisito:</em> 7º nível</p>
  <p>Você pode conjurar <strong>compulsão</strong> uma vez, usando um espaço de magia de bruxo. Não pode fazê-lo novamente até terminar um descanso longo.</p>

  <h3>Uno com as Sombras</h3>
  <p class="invocation-info"><em>Pré-requisito:</em> 5º nível</p>
  <p>Quando você estiver em uma área de penumbra ou escuridão, pode usar sua ação para ficar invisível até se mover ou realizar uma ação ou reação.</p>

  <h3>Vigor Abissal</h3>
  <p>Você pode conjurar <strong>vitalidade falsa</strong> em si mesmo, à vontade, como magia de 1º nível, sem gastar espaço de magia ou componentes materiais.</p>

  <h3>Visão da Bruxa</h3>
  <p class="invocation-info"><em>Pré-requisito:</em> 15º nível</p>

const toggleWrapper = document.querySelector(".toggle-wrapper");

let isAnimating = false;

/* anima toggle (só uma vez) */
function animateToggle() {
  toggleWrapper.classList.remove("animate-in");
  void toggleWrapper.offsetHeight;
  toggleWrapper.classList.add("animate-in");
}

/* anima card */
function animateCardIn() {
  content.classList.add("animate-in");
}

function animateCardOut(callback) {
  content.classList.remove("animate-in");
  setTimeout(callback, 100);
}

/* troca de conteúdo com lock */
function swapContent(html, is5e) {
  if (isAnimating) return;

  // evita reanimar se já estiver ativo
  if (
    (is5e && btn5e.classList.contains("active")) ||
    (!is5e && btnOne.classList.contains("active"))
  ) {
    return;
  }

  isAnimating = true;

  btn5e.classList.toggle("active", is5e);
  btnOne.classList.toggle("active", !is5e);

  animateCardOut(() => {
    content.innerHTML = html;

    void content.offsetHeight;

    animateCardIn();

    setTimeout(() => {
      isAnimating = false;
    }, 550); // duração da animação do card
  });
}

/* eventos */
btn5e.addEventListener("click", () => swapContent(bruxo5e, true));
btnOne.addEventListener("click", () => swapContent(bruxoOne, false));

/* carga inicial */
requestAnimationFrame(() => {
  animateToggle();
  content.innerHTML = bruxo5e;
  animateCardIn();
  btn5e.classList.add("active");
});
</script>
