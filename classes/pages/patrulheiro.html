<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patrulheiro • D&D</title>

<style>
:root {
  --bg: #0f1115;
  --bg-soft: #181b22;
  --card: #1f2430;
  --border: #2c3240;
  --text: #e6e6eb;
  --muted: #9aa0b4;
  --accent: #5da9ff;
}

* { box-sizing: border-box; }

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, sans-serif;
}

/* BOTÃO VOLTAR */
.back-button {
  position: fixed;
  top: 18px;
  left: 18px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 2000;
}

.hero {
  position: relative;
  height: 520px; /* altura visual mínima */
  width: 100%;
  overflow: visible;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(15,17,21,0.15) 40%,
    var(--bg) 100%
  );
}

.hero-content {
  position: absolute;
  top: 250px; /* controla a altura visual que você quer */
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 1200px; /* card mais largo */
  padding: 0 16px;
  z-index: 5;
}

/* TOGGLE */
.toggle-wrapper {
  display: flex;
  justify-content: center;
  margin-bottom: 18px;
  opacity: 0;
  transform: translateY(-20px);
  transition:
    opacity 0.45s ease-out,
    transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
}

.toggle {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 999px;
  display: flex;
  padding: 6px;
  gap: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.toggle-wrapper.animate-in {
  opacity: 1;
  transform: translateY(0);
}

.toggle button {
  background: transparent;
  border: none;
  border-radius: 999px;
  padding: 8px 14px;
  cursor: pointer;
  opacity: 0.6;
}

.toggle button.active {
  background: white;
  opacity: 1;
}

.toggle img {
  height: 24px;
}

/* Ícone padrão (inativo) */
.toggle button img {
  filter: invert(0%) grayscale(0%);
  transition: filter 0.2s ease;
}

/* Ícone quando o botão está ativo (fundo branco) */
.toggle button.active img {
  filter: invert(100%) grayscale(100%);
}

.card {
  max-width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 34px;
  box-shadow: 0 30px 70px rgba(0,0,0,0.6);
  transition-delay: 0.08s;
  opacity: 0;
  transform: translateY(40px);
  transition:
    opacity 0.55s ease-out,
    transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
}

.card.animate-in {
  opacity: 1;
  transform: translateY(0);
}

/* CONTEÚDO */
.card h1 {
  text-align: center;
  font-size: 2.5rem;
  margin-top: 0;
}

.subtitle {
  text-align: center;
  color: var(--muted);
  margin-bottom: 34px;
}

/* SEÇÕES */
.section {
  margin-bottom: 30px;
}

.section h2 {
  font-size: 1.35rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  margin-bottom: 10px;
}

.section p {
  line-height: 1.65;
}

.table-wrapper {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
  min-width: 720px;
}

table tr.active-row{
  background: rgba(255, 255, 255, 0.08);
}

table tr{
  cursor: pointer;
  transition: background 0.25s ease;
}

@media (hover: hover) {
  table tr:hover{
    background: rgba(255, 255, 255, 0.04);
  }
}

th, td {
  border: 1px solid var(--border);
  padding: 10px;
  text-align: center;
}

th {
  background: var(--bg-soft);
}

.subclasse-container {
  display: flex;
  flex-wrap: wrap;
  grid-template-columns: repeat(auto-fit, 180px);
  gap: 20px;
  justify-content: center;
  margin: 20px auto 0;
}

.subclasse-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 0;
  width: 180px;
  overflow: hidden;
  cursor: pointer;
  text-align: center;
  color: var(--text);
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
}

.subclasse-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
  border-color: var(--accent);
}

.subclasse-card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  display: block;
}

.subclasse-card h3 {
  margin: 12px 0;
  font-size: 1rem;
}

main {
  max-width: 1100px;
  margin: auto;
  padding: 80px 16px;
  margin-top: 260px; /* espaço para o card crescer */
}

/* Links sutis destacados */
.section a{
  color: #9cd1ff;            /* cor base branca */
  font-weight: 600;          /* levemente negrito */
  text-decoration: none;
  position: relative;
  transition: color 0.3s ease;
}

/* Linha animada por baixo do link */
.section a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -2px;              /* espaçamento da linha */
  width: 0%;
  height: 2px;               /* espessura da linha */
  background: #5da9ff;       /* cor sutil da paleta (accent) */
  border-radius: 1px;        /* suaviza a linha */
  transition: width 0.3s ease;
}

/* Hover: anima a linha e muda levemente a cor */
.section a:hover {
  color: #dce6ff;            /* leve clareamento no hover */
}

.section a:hover::after {
  width: 100%;
}

@media (max-width: 600px) {
  .subclasse-container {
    gap: 14px;
  }

  .subclasse-card {
    width: calc(50% - 14px);
    max-width: 180px;
    border-radius: 12px;
  }

  .subclasse-card img {
    height: 110px;
  }

  .subclasse-card h3 {
    font-size: 0.9rem;
    margin: 8px 0;
  }
}
</style>
</head>

    Diferente de conjuradores arcanos, a magia do patrulheiro
    flui de sua <strong>conexão instintiva com o mundo natural</strong>
    e de sua experiência como caçador e explorador.
  </p>

  <h3>Foco de Conjuração</h3>
  <p>
    Você pode usar um <strong>foco druídico</strong> como foco de
    conjuração para suas magias de patrulheiro.
  </p>

  <h3>Preparando e Conjurando Magias</h3>
  <p>
    A tabela do Patrulheiro mostra quantos espaços de magia
    você possui para conjurar suas magias de patrulheiro.
    Para conjurar uma magia de patrulheiro de 1º nível ou
    superior, você deve gastar um espaço de magia do nível
    da magia ou superior. Você recupera todos os espaços de
    magia gastos quando termina um descanso longo.
  </p>

  <p>
    Você conhece um número de magias de patrulheiro,
    escolhendo-as da
    <a href="../magias.html">Lista de magias de Patrulheiro</a>.
    O número de magias que você conhece está indicado
    na tabela de progressão do patrulheiro.
  </p>

  <p>
    As magias devem ser de um nível para o qual você possua
    espaços de magia. Sempre que ganhar um nível nesta
    classe, você pode substituir uma magia que conhece
    por outra da lista de magias de patrulheiro, para a qual
    possua espaços de magia.
  </p>

  <h3>Habilidade de Conjuração</h3>
  <p>
    <strong>Sabedoria</strong> é a sua habilidade de conjuração para
    suas magias de patrulheiro, pois sua percepção aguçada
    e sintonia com a natureza alimentam seus efeitos
    mágicos. Você usa seu modificador de Sabedoria sempre
    que uma magia de patrulheiro fizer referência à sua
    habilidade de conjuração.
  </p>

  <p>
    <strong>CD para teste de resistência</strong> = 8 + seu bônus de
    proficiência + seu modificador de Sabedoria
  </p>

  <p>
    <strong>Modificador de ataque de magia</strong> = seu bônus de
    proficiência + seu modificador de Sabedoria
  </p>
</div>

    Essa característica de 3º nível substitui a característica
    Consciência Primitiva. Você não recebe nenhum benefício

  </p>

  <p>
    Você pode focar sua percepção através das interconexões
    da natureza. Você aprende magias adicionais quando
    alcança certos níveis nesta classe, caso ainda não as
    conheça, conforme mostrado na tabela de Magias de
    Consciência Primal. Essas magias não contam contra o
    número de magias de patrulheiro que você conhece.
  </p>

  <p>
    Você pode conjurar cada uma dessas magias uma vez sem

<div class="section">
  <h2>Incremento no Valor de Habilidade</h2>

  <p>
    Quando você atinge o <strong>4º nível</strong>, e novamente no
    <strong>8º, 12º, 16º e 19º níveis</strong>, você pode aumentar
    seus valores de habilidade.
  </p>

  <p>
    Você pode escolher uma das opções abaixo:
  </p>

  <ul class="bullet-list">
    <li>
      Aumentar <strong>um valor de habilidade</strong>, à sua escolha, em <strong>2</strong>;
    </li>
    <li>
      Aumentar <strong>dois valores de habilidade diferentes</strong>, à sua escolha, em <strong>1</strong> cada.
    </li>
  </ul>

  <p>
    Como padrão, você <strong>não pode elevar um valor de habilidade acima de 20</strong>
    usando essa característica.
  </p>
</div>

<div class="section">
  <h2>Versatilidade Marcial (Opcional)</h2>

  <p>
    Sempre que você alcançar um nível nesta classe que
    conceda a característica Incremento no Valor de
    Habilidade, você pode substituir um Estilo de Luta que
    conhece por outro Estilo de Luta disponível para
    patrulheiros. Essa substituição representa uma mudança
    de foco em sua prática marcial.
  </p>
</div>

<div class="section">
  <h2>Ataque Extra</h2>

  <p>
    A partir do 5° nível, você pode atacar duas vezes, ao invés
    de uma, sempre que você realizar a ação de Ataque no seu
    turno.
  </p>
</div>

<div class="section">
  <h2>Inimigo Favorito Maior</h2>

  <p>
    A partir do 6° nível, você está pronto para caçar mesmo as
    presas mais mortais. Escolha um tipo de inimigo favorito
    maior: aberrações, celestiais, constructos, corruptores,
    dragões, elementais ou gigantes. Você ganha todos os
    benefícios contra o inimigo escolhido que você
    normalmente ganha contra seu inimigo favorito, além do
    idioma adicional. Seu bônus nas jogadas de dano contra
    todos os seus inimigos favoritos aumenta para +4.
  </p>

  <p>
    Além disso, você tem vantagem em testes de
    resistência contra magias e habilidades usadas por um
    inimigo favorito maior.
  </p>
</div>

<div class="section">
  <h2>Pés Rápidos</h2>

  <p>
    Começando no 8° nível, você pode usar a ação de
    Disparada como uma ação bônus no seu turno.
  </p>
</div>

<div class="section">
  <h2>Mimetismo</h2>

  <p>
    A partir do 10° nível, você pode permanecer
    perfeitamente imóvel por longos períodos de tempo para
    preparar uma emboscada.
  </p>

  <p>
    Quando você tentar se esconder no seu turno, você
    pode optar por não se mover nesse turno. Se você evitar
    se mover, criaturas que tentarem detectar você sofrem
    –10 de penalidade em testes de Sabedoria (Percepção) até
    o começo do seu próximo turno. Você perde esse benefício
    caso se mova ou caia no chão, voluntariamente ou por um
    efeito externo. Você ainda será automaticamente
    detectado caso algum efeito ou ação faça com que você não
    esteja mais escondido.
  </p>

  <p>
    Se você ainda estiver escondido no seu turno, você
    pode continuar imóvel e ganhar esse benefício até ser
    detectado.
  </p>
</div>

<div class="section">
  <h2>Véu da Natureza (Opcional)</h2>

  <p>
    Essa característica de 10º nível substitui a característica
    Mimetismo. Você não recebe nenhum benefício da
    característica substituída e não se qualifica para nada no
    jogo que exija essa característica.
  </p>

  <p>
    Você invoca os poderes da natureza para ocultar-se
    brevemente da vista. Como uma ação bônus, você pode
    se tornar magicamente invisível, juntamente com
    qualquer equipamento que esteja vestindo ou carregando,
    até o início do seu próximo turno.
  </p>

  <p>
    Você pode usar essa característica um número de vezes
    igual ao seu bônus de proficiência, e recupera todos os
    usos gastos quando termina um descanso longo.
  </p>
</div>

<div class="section">
  <h2>Desaparecer</h2>

  <p>
    Começando no 14° nível, você pode usar a ação de
    Esconder, com uma ação bônus, no seu turno. Além disso,
    você não pode ser rastreado por meios não-mágicos, a não
    ser que você decida deixar um rastro.
  </p>
</div>

<div class="section">
  <h2>Sentidos Selvagens</h2>

  <p>
    No 18° nível, você ganha sentidos preternaturais que o
    ajudam a lutar contra criaturas que você não pode ver.
  </p>

  <p>
    Quando você atacar uma criatura que você não possa
    ver, sua incapacidade em vê-la não impõem desvantagem
    nas suas jogadas de ataque contra ela.
  </p>

  <p>
    Você também está ciente da localização de qualquer
    criatura invisível a até 9 metros de você, considerando
    que a criatura não esteja se escondendo de você e você
    não esteja cego ou surdo.
  </p>
</div>

<div class="section">
  <h2>Matador de Inimigos</h2>

  <p>
    No 20° nível, você se torna um caçador incomparável.
    Uma vez em cada um dos seus turnos, você pode
    adicionar seu modificador de Sabedoria na jogada de
    ataque ou jogada de dano de um ataque que você fizer.
    Você pode escolher usar essa característica antes ou
    depois da rolagem, mas antes de qualquer efeito da
    jogada ser aplicado.
  </p>
</div>

const toggleWrapper = document.querySelector(".toggle-wrapper");

let isAnimating = false;

/* anima toggle (só uma vez) */
function animateToggle() {
  toggleWrapper.classList.remove("animate-in");
  void toggleWrapper.offsetHeight;
  toggleWrapper.classList.add("animate-in");
}

/* anima card */
function animateCardIn() {
  content.classList.add("animate-in");
}

function animateCardOut(callback) {
  content.classList.remove("animate-in");
  setTimeout(callback, 100);
}

/* troca de conteúdo com lock */
function swapContent(html, is5e) {
  if (isAnimating) return;

  // evita reanimar se já estiver ativo
  if (
    (is5e && btn5e.classList.contains("active")) ||
    (!is5e && btnOne.classList.contains("active"))
  ) {
    return;
  }

  isAnimating = true;

  btn5e.classList.toggle("active", is5e);
  btnOne.classList.toggle("active", !is5e);

  animateCardOut(() => {
    content.innerHTML = html;

    void content.offsetHeight;

    animateCardIn();

    setTimeout(() => {
      isAnimating = false;
    }, 550); // duração da animação do card
  });
}

/* eventos */
btn5e.addEventListener("click", () => swapContent(patrulheiro5e, true));
btnOne.addEventListener("click", () => swapContent(patrulheiroOne, false));

/* carga inicial */
requestAnimationFrame(() => {
  animateToggle();
  content.innerHTML = patrulheiro5e;
  animateCardIn();
  btn5e.classList.add("active");
});
