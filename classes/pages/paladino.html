<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paladino • D&D</title>

<style>
:root {
  --bg: #0f1115;
  --bg-soft: #181b22;
  --card: #1f2430;
  --border: #2c3240;
  --text: #e6e6eb;
  --muted: #9aa0b4;
  --accent: #5da9ff;
}

* { box-sizing: border-box; }

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, sans-serif;
}

/* BOTÃO VOLTAR */
.back-button {
  position: fixed;
  top: 18px;
  left: 18px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 2000;
}

.hero {
  position: relative;
  height: 520px; /* altura visual mínima */
  width: 100%;
  overflow: visible;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(15,17,21,0.15) 40%,
    var(--bg) 100%
  );
}

.hero-content {
  position: absolute;
  top: 250px; /* controla a altura visual que você quer */
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 1200px; /* card mais largo */
  padding: 0 16px;
  z-index: 5;
}

/* TOGGLE */
.toggle-wrapper {
  display: flex;
  justify-content: center;
  margin-bottom: 18px;
  opacity: 0;
  transform: translateY(-20px);
  transition:
    opacity 0.45s ease-out,
    transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
}

.toggle {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 999px;
  display: flex;
  padding: 6px;
  gap: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.toggle-wrapper.animate-in {
  opacity: 1;
  transform: translateY(0);
}

.toggle button {
  background: transparent;
  border: none;
  border-radius: 999px;
  padding: 8px 14px;
  cursor: pointer;
  opacity: 0.6;
}

.toggle button.active {
  background: white;
  opacity: 1;
}

.toggle img {
  height: 24px;
}

/* Ícone padrão (inativo) */
.toggle button img {
  filter: invert(0%) grayscale(0%);
  transition: filter 0.2s ease;
}

/* Ícone quando o botão está ativo (fundo branco) */
.toggle button.active img {
  filter: invert(100%) grayscale(100%);
}

.card {
  max-width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 34px;
  box-shadow: 0 30px 70px rgba(0,0,0,0.6);
  transition-delay: 0.08s;
  opacity: 0;
  transform: translateY(40px);
  transition:
    opacity 0.55s ease-out,
    transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
}

.card.animate-in {
  opacity: 1;
  transform: translateY(0);
}

/* CONTEÚDO */
.card h1 {
  text-align: center;
  font-size: 2.5rem;
  margin-top: 0;
}

.subtitle {
  text-align: center;
  color: var(--muted);
  margin-bottom: 34px;
}

/* SEÇÕES */
.section {
  margin-bottom: 30px;
}

.section h2 {
  font-size: 1.35rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  margin-bottom: 10px;
}

.section p {
  line-height: 1.65;
}

.table-wrapper {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
  min-width: 720px;
}

table tr.active-row{
  background: rgba(255, 255, 255, 0.08);
}

table tr{
  cursor: pointer;
  transition: background 0.25s ease;
}

@media (hover: hover) {
  table tr:hover{
    background: rgba(255, 255, 255, 0.04);
  }
}

th, td {
  border: 1px solid var(--border);
  padding: 10px;
  text-align: center;
}

th {
  background: var(--bg-soft);
}

.subclasse-container {
  display: flex;
  flex-wrap: wrap;
  grid-template-columns: repeat(auto-fit, 180px);
  gap: 20px;
  justify-content: center;
  margin: 20px auto 0;
}

.subclasse-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 0;
  width: 180px;
  overflow: hidden;
  cursor: pointer;
  text-align: center;
  color: var(--text);
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
}

.subclasse-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
  border-color: var(--accent);
}

.subclasse-card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  display: block;
}

.subclasse-card h3 {
  margin: 12px 0;
  font-size: 1rem;
}

main {
  max-width: 1100px;
  margin: auto;
  padding: 80px 16px;
  margin-top: 260px; /* espaço para o card crescer */
}

/* Links sutis destacados */
.section a{
  color: #9cd1ff;            /* cor base branca */
  font-weight: 600;          /* levemente negrito */
  text-decoration: none;
  position: relative;
  transition: color 0.3s ease;
}

/* Linha animada por baixo do link */
.section a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -2px;              /* espaçamento da linha */
  width: 0%;
  height: 2px;               /* espessura da linha */
  background: #5da9ff;       /* cor sutil da paleta (accent) */
  border-radius: 1px;        /* suaviza a linha */
  transition: width 0.3s ease;
}

/* Hover: anima a linha e muda levemente a cor */
.section a:hover {
  color: #dce6ff;            /* leve clareamento no hover */
}

.section a:hover::after {
  width: 100%;
}

@media (max-width: 600px) {
  .subclasse-container {
    gap: 14px;
  }

  .subclasse-card {
    width: calc(50% - 14px);
    max-width: 180px;
    border-radius: 12px;
  }

  .subclasse-card img {
    height: 110px;
  }

  .subclasse-card h3 {
    font-size: 0.9rem;
    margin: 8px 0;
  }
}
</style>
</head>

<button class="back-button" onclick="location.href='../classe.html'">&lt;</button>

<div class="section">
  <h2>Sentido Divino</h2>

  <p>
    A presença de um <strong>mal poderoso</strong> é registrada nos seus
    sentidos como um odor nocivo, enquanto o <strong>bem poderoso</strong>

  <p>

  <p>

    lugar ou objeto que tenha sido <strong>consagrado ou conspurcado</strong>,

  <p>

<div class="section">
  <h2>Cura pelas Mãos</h2>

  <p>
    Seu toque abençoado pode curar ferimentos. Você possui um
    <strong>poço de poder curativo</strong> que se renova sempre que
    você conclui um <strong>descanso longo</strong>.

  </p>

  </p>
</div>

<div class="section">

    Você não pode escolher o mesmo Estilo de Luta mais de uma vez,

  <h3>Combate com Armas Grandes</h3>
  <p>
    Quando você rolar um <strong>1 ou 2</strong> em um dado de dano de um
    ataque com arma corpo a corpo que esteja empunhando com

  <p>

    <strong>versátil</strong> para receber esse benefício.
  </p>

  <h3>Defesa</h3>
  <p>

    <strong>+1 de bônus na Classe de Armadura (CA)</strong>.
  </p>

  <h3>Duelismo</h3>
  <p>
    Quando você empunhar uma arma corpo a corpo em
    <strong>uma mão</strong> e nenhuma outra arma, você recebe
    <strong>+2 de bônus nas jogadas de dano</strong> com essa arma.
  </p>

  <h3>Proteção</h3>
  <p>
    Quando uma criatura que você possa ver atacar um alvo que esteja
    a até <strong>1,5 metro</strong> de você, você pode usar sua
    <strong>reação</strong> para impor <strong>desvantagem</strong> na
    jogada de ataque da criatura.
  </p>
  <p>

    <strong>escudo</strong>.
  </p>
</div>

<div class="section">

  <p>
    Através de sua devoção e do poder de seus juramentos sagrados,
    você é capaz de canalizar <strong>magia divina</strong> para realizar
    feitos sobrenaturais. Diferente de conjuradores arcanos, a magia

    determinação em seguir seus votos.
  </p>

  <h3>Foco de Conjuração</h3>
  <p>
    Você pode usar um <strong>símbolo sagrado</strong> como foco de conjuração

  </p>

  <h3>Preparando e Conjurando Magias</h3>
  <p>
    A tabela do Paladino mostra quantos espaços de magia você possui para
    conjurar suas magias de paladino. Para conjurar uma magia de paladino
    de 1º nível ou superior, você deve gastar um espaço de magia do nível
    da magia ou superior. Você recupera todos os espaços de magia gastos
    quando termina um descanso longo.
  </p>

  <p>
    Você prepara a lista de magias de paladino que estão disponíveis para
    você conjurar, escolhendo-as da
    <a href="../magias.html">Lista de magias de Paladino</a>.
    Quando fizer isso, escolha um número de magias igual ao seu
    <strong>modificador de Carisma + metade do seu nível de paladino</strong>,
    arredondado para baixo (mínimo de uma magia).
  </p>

  <p>
    As magias devem ser de um nível para o qual você possua espaços de magia.
    Você pode mudar sua lista de magias preparadas quando terminar
    um descanso longo.
  </p>

  <h3>Habilidade de Conjuração</h3>
  <p>
    <strong>Carisma</strong> é a sua habilidade de conjuração para suas magias
    de paladino, pois o poder de sua fé e a força de seus juramentos
    alimentam seus efeitos mágicos. Você usa seu modificador de Carisma
    sempre que uma magia de paladino fizer referência à sua habilidade
    de conjuração.
  </p>

  <p>
    <strong>CD para teste de resistência</strong> = 8 + seu bônus de proficiência

  </p>

    + seu modificador de Carisma

    com um ataque corpo a corpo com arma, você pode gastar um
    <strong>espaço de magia de qualquer classe</strong> para causar
    <strong>dano radiante</strong> adicional ao alvo, além do dano normal da arma.

    <strong>1º nível</strong>, mais <strong>1d8</strong> para cada espaço

  </p>

  <p>
    O dano aumenta em <strong>1d8</strong> se o alvo for um
    <strong>corruptor</strong> ou um <strong>morto-vivo</strong>.
  </p>
</div>

<div class="section">
  <h2>Saúde Divina</h2>

  <p>

  </p>
</div>

<div class="section">

const toggleWrapper = document.querySelector(".toggle-wrapper");

let isAnimating = false;

/* anima toggle (só uma vez) */
function animateToggle() {
  toggleWrapper.classList.remove("animate-in");
  void toggleWrapper.offsetHeight;
  toggleWrapper.classList.add("animate-in");
}

/* anima card */
function animateCardIn() {
  content.classList.add("animate-in");
}

function animateCardOut(callback) {
  content.classList.remove("animate-in");
  setTimeout(callback, 100);
}

/* troca de conteúdo com lock */
function swapContent(html, is5e) {
  if (isAnimating) return;

  // evita reanimar se já estiver ativo
  if (
    (is5e && btn5e.classList.contains("active")) ||
    (!is5e && btnOne.classList.contains("active"))
  ) {
    return;
  }

  isAnimating = true;

  btn5e.classList.toggle("active", is5e);
  btnOne.classList.toggle("active", !is5e);

  animateCardOut(() => {
    content.innerHTML = html;

    void content.offsetHeight;

    animateCardIn();

    setTimeout(() => {
      isAnimating = false;
    }, 550); // duração da animação do card
  });
}

/* eventos */
btn5e.addEventListener("click", () => swapContent(paladino5e, true));
btnOne.addEventListener("click", () => swapContent(paladinoOne, false));

/* carga inicial */
requestAnimationFrame(() => {
  animateToggle();
  content.innerHTML = paladino5e;
  animateCardIn();
  btn5e.classList.add("active");
});
