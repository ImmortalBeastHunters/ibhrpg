<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clérigo • D&D</title>

<style>
:root {
  --bg: #0f1115;
  --bg-soft: #181b22;
  --card: #1f2430;
  --border: #2c3240;
  --text: #e6e6eb;
  --muted: #9aa0b4;
  --accent: #5da9ff;
}

* { box-sizing: border-box; }

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, sans-serif;
}

/* BOTÃO VOLTAR */
.back-button {
  position: fixed;
  top: 18px;
  left: 18px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 2000;
}

.hero {
  position: relative;
  height: 520px; /* altura visual mínima */
  width: 100%;
  overflow: visible;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(15,17,21,0.15) 40%,
    var(--bg) 100%
  );
}

.hero-content {
  position: absolute;
  top: 250px; /* controla a altura visual que você quer */
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 1200px; /* card mais largo */
  padding: 0 16px;
  z-index: 5;
}

/* TOGGLE */
.toggle-wrapper {
  display: flex;
  justify-content: center;
  margin-bottom: 18px;
  opacity: 0;
  transform: translateY(-20px);
  transition:
    opacity 0.45s ease-out,
    transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
}

.toggle {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 999px;
  display: flex;
  padding: 6px;
  gap: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.toggle-wrapper.animate-in {
  opacity: 1;
  transform: translateY(0);
}

.toggle button {
  background: transparent;
  border: none;
  border-radius: 999px;
  padding: 8px 14px;
  cursor: pointer;
  opacity: 0.6;
}

.toggle button.active {
  background: white;
  opacity: 1;
}

.toggle img {
  height: 24px;
}

/* Ícone padrão (inativo) */
.toggle button img {
  filter: invert(0%) grayscale(0%);
  transition: filter 0.2s ease;
}

/* Ícone quando o botão está ativo (fundo branco) */
.toggle button.active img {
  filter: invert(100%) grayscale(100%);
}

.card {
  max-width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 34px;
  box-shadow: 0 30px 70px rgba(0,0,0,0.6);
  transition-delay: 0.08s;
  opacity: 0;
  transform: translateY(40px);
  transition:
    opacity 0.55s ease-out,
    transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
}

.card.animate-in {
  opacity: 1;
  transform: translateY(0);
}

/* CONTEÚDO */
.card h1 {
  text-align: center;
  font-size: 2.5rem;
  margin-top: 0;
}

.subtitle {
  text-align: center;
  color: var(--muted);
  margin-bottom: 34px;
}

/* SEÇÕES */
.section {
  margin-bottom: 30px;
}

.section h2 {
  font-size: 1.35rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  margin-bottom: 10px;
}

.section p {
  line-height: 1.65;
}

.table-wrapper {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
  min-width: 720px;
}

table tr.active-row{
  background: rgba(255, 255, 255, 0.08);
}

table tr{
  cursor: pointer;
  transition: background 0.25s ease;
}

@media (hover: hover) {
  table tr:hover{
    background: rgba(255, 255, 255, 0.04);
  }
}

th, td {
  border: 1px solid var(--border);
  padding: 10px;
  text-align: center;
}

th {
  background: var(--bg-soft);
}

.subclasse-container {
  display: flex;
  flex-wrap: wrap;
  grid-template-columns: repeat(auto-fit, 180px);
  gap: 20px;
  justify-content: center;
  margin: 20px auto 0;
}

.subclasse-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 0;
  width: 180px;
  overflow: hidden;
  cursor: pointer;
  text-align: center;
  color: var(--text);
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
}

.subclasse-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
  border-color: var(--accent);
}

.subclasse-card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  display: block;
}

.subclasse-card h3 {
  margin: 12px 0;
  font-size: 1rem;
}

main {
  max-width: 1100px;
  margin: auto;
  padding: 80px 16px;
  margin-top: 260px; /* espaço para o card crescer */
}

/* Links sutis destacados */
.section a{
  color: #9cd1ff;            /* cor base branca */
  font-weight: 600;          /* levemente negrito */
  text-decoration: none;
  position: relative;
  transition: color 0.3s ease;
}

/* Linha animada por baixo do link */
.section a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -2px;              /* espaçamento da linha */
  width: 0%;
  height: 2px;               /* espessura da linha */
  background: #5da9ff;       /* cor sutil da paleta (accent) */
  border-radius: 1px;        /* suaviza a linha */
  transition: width 0.3s ease;
}

/* Hover: anima a linha e muda levemente a cor */
.section a:hover {
  color: #dce6ff;            /* leve clareamento no hover */
}

.section a:hover::after {
  width: 100%;
}

@media (max-width: 600px) {
  .subclasse-container {
    gap: 14px;
  }

  .subclasse-card {
    width: calc(50% - 14px);
    max-width: 180px;
    border-radius: 12px;
  }

  .subclasse-card img {
    height: 110px;
  }

  .subclasse-card h3 {
    font-size: 0.9rem;
    margin: 8px 0;
  }
}
</style>
</head>

  <h2>Conjuração</h2>

  <p>
    Como clérigo, você canaliza a energia divina de sua divindade para moldar o mundo ao seu redor. 
    Suas magias refletem a vontade do seu deus ou força espiritual, podendo ser ajustadas para diversas situações.
  </p>

  <h3>Truques</h3>
  <p>
    No <strong>1º nível</strong>, você conhece três truques de sua escolha presentes na 
    <a href="../magias.html">Lista de Magias de Clérigo</a>. Em níveis superiores, você aprende truques adicionais da lista de clérigo, 
    como mostrado na coluna <a href="../magias.html">Truques Conhecidos</a> na tabela do Clérigo.
  </p>
  <p>
    Quando você ganhar um nível nesta classe, pode substituir um dos truques de Clérigo que conhece por outro truque da 
    <a href="../magias.html">Lista de Magias de Clérigo</a>.
  </p>

  <h3>Preparando e Conjurando Magias</h3>
  <p>
    A tabela do Clérigo mostra quantos espaços de magia você possui para conjurar suas magias de clérigo de 1º nível ou superior. 
    Para conjurar uma dessas magias, você deve consumir um espaço do nível da magia ou superior. 
    Você recupera todos os espaços de magia gastos quando finaliza um descanso longo.
  </p>
  <p>
    Você pode preparar um número de magias de clérigo a cada dia conforme mostrado na coluna 
    <a href="../magias.html">Magias Preparadas</a> da tabela do Clérigo. Cada magia deve ser de um nível para o qual você possua espaços de magia.
  </p>
  <p>
    Quando você ganhar um nível nesta classe, pode trocar uma das magias preparadas por outra magia da 
    <a href="../magias.html">Lista de Magias de Clérigo</a>, também de um nível para o qual você possua espaços de magia.
  </p>

  <h3>Habilidade de Conjuração</h3>
  <p>
    Sabedoria é sua habilidade de conjuração para as magias de Clérigo: sua percepção espiritual e fé permitem que você canalize magia com eficácia. 
    Você usa seu modificador de Sabedoria sempre que uma magia de Clérigo se referir à sua habilidade de conjuração. 
    Além disso, você usa seu modificador de Sabedoria ao definir a CD dos testes de resistência para suas magias de Clérigo e ao realizar jogadas de ataque com magia.
  </p>
  <p>
    <strong>CD teste de resistência</strong> = 8 + seu bônus de proficiência + seu modificador de Sabedoria
  </p>
  <p>
    <strong>Modificador de ataque de magia</strong> = seu bônus de proficiência + seu modificador de Sabedoria
  </p>

  <h3>Conjuração de Ritual</h3>
  <p>
    Você pode conjurar qualquer magia de Clérigo que conheça como um ritual, se essa magia possuir a etiqueta <strong>ritual</strong>.
  </p>

  <h3>Foco de Conjuração</h3>
  <p>
    Você pode usar um símbolo sagrado (encontrado no capítulo 5) como foco de conjuração para suas magias de Clérigo.
  </p>

  <h3>Feitiços de Domínio</h3>

  <p>
    Cada domínio tem uma lista de magias — suas magias de domínio que você ganha nos níveis de clérigo indicados na descrição do domínio. Depois que você ganha uma magia de domínio, você sempre a tem preparada, e ela não conta para o número de magias que você pode preparar por dia.
    Se você tem uma magia de domínio que não aparece na lista de magias do clérigo, a magia ainda assim é uma magia de clérigo para você.
  </p>
</div>

<div class="section">
  <h2>Canalizar a Divindade</h2>

  <p>
    No <strong>2º nível</strong>, você ganha a habilidade de canalizar energia divina diretamente da sua divindade,
    usando essa energia para alimentar efeitos mágicos. Você começa com dois desses efeitos: 
    <strong>Transformar Mortos-Vivos</strong> e um efeito determinado pelo seu domínio.
    Alguns domínios concedem efeitos adicionais conforme você avança de nível, conforme indicado na descrição do domínio.
  </p>

  <p>
    Quando você usa seu Canalizar Divindade, você escolhe qual efeito criar. 
    Você deve então terminar um descanso curto ou longo para usar sua Canalização de Divindade novamente.
  </p>

  <p>
    Alguns efeitos de Canalizar Divindade exigem testes de resistência. 
    Quando você usa esse efeito desta classe, a CD é igual à sua CD de resistência de feitiço de clérigo.
  </p>

  <p>
    A partir do <strong>6º nível</strong>, você pode usar seu Canalizar Divindade duas vezes entre os descansos, 
    e a partir do <strong>18º nível</strong>, pode usá-lo três vezes entre os descansos. 
    Quando você termina um descanso curto ou longo, recupera seus usos gastos.
  </p>

  <h3>Canalizar Divindade: Transformar Mortos-Vivos</h3>

  <p>
    Como ação, você apresenta seu símbolo sagrado e faz uma oração censurando os mortos-vivos. 
    Cada morto-vivo que pode te ver ou ouvir a menos de 30 pés de você deve fazer um teste de resistência de Sabedoria. 
    Se a criatura falhar no teste de resistência, ela fica virada por 1 minuto ou até receber qualquer dano.
  </p>

  <p>
    Uma criatura transformada deve passar seus turnos tentando se afastar o máximo possível de você, 
    e não pode se mover voluntariamente para um espaço a menos de 30 pés de você. Também não aguenta reações. 
    Para sua ação, ela pode usar apenas a ação de <strong>Dash</strong> ou tentar escapar de um efeito que a impede de se mover. 
    Se não houver para onde se mover, a criatura pode usar a ação de <strong>Esquivar</strong>.
  </p>
</div>

<div class="section">
  <h2>Dominar o Poder Divino (Opcional)</h2>

  <p>
    No <strong>2º nível</strong>, você pode gastar o uso da sua <strong>Canalizar Divindade</strong> 
    para alimentar suas magias. Como <strong>ação bônus</strong>, você toca seu símbolo sagrado, 
    faz uma oração e recupera um espaço de magia gasto, cujo nível não pode ser maior que metade 
    do seu bônus de proficiência (arredondado para cima).
  </p>

  <p>
    O número de vezes que você pode usar essa característica depende do nível que você alcançou nesta classe: 
    <strong>2º nível</strong>, uma vez; <strong>6º nível</strong>, duas vezes; e <strong>18º nível</strong>, três vezes. 
    Você recupera todos os usos gastos quando termina um descanso longo.
  </p>
</div>

<div class="section">
  <h2>Incremento no Valor de Habilidade</h2>

  <p>
    Quando você atinge o <strong>4º nível</strong>, e novamente no
    <strong>8º, 12º, 16º e 19º níveis</strong>, você pode aumentar
    seus valores de habilidade.
  </p>

  <p>
    Você pode escolher uma das opções abaixo:
  </p>

  <ul class="bullet-list">
    <li>
      Aumentar <strong>um valor de habilidade</strong>, à sua escolha, em <strong>2</strong>;
    </li>
    <li>
      Aumentar <strong>dois valores de habilidade diferentes</strong>, à sua escolha, em <strong>1</strong> cada.
    </li>
  </ul>

  <p>
    Como padrão, você <strong>não pode elevar um valor de habilidade acima de 20</strong>
    usando essa característica.
  </p>
</div>

<div class="section">
  <h2>Versatilidade de Truques (Opcional)</h2>

  <p>
    Sempre que você atingir um nível nesta classe que conceda a habilidade de <strong>Melhoria de Pontuação de Habilidade</strong>, 
    você pode substituir um truque que aprendeu com a habilidade de <strong>Conjuração</strong> desta classe por outro truque da 
    <a href="../magias.html">Lista de Magias de Clérigo</a>.
  </p>
</div>

<div class="section">
  <h2>Destruir os Mortos-Vivos</h2>
  <p>
    A partir do <strong>5º nível</strong>, quando um morto-vivo falha no teste de resistência
    contra sua habilidade <strong>Canalizar Divindade: Transformar Mortos-Vivos</strong>,
    a criatura é destruída instantaneamente se sua classificação de desafio estiver em
    um certo limite ou abaixo, como mostrado na tabela do Clérigo acima.
  </p>
</div>

<div class="section">
  <h2>Golpes Abençoados (Opcional)</h2>
  <p>
    Substitui a característica <strong>Golpe Divino</strong> ou <strong>Conjuração Potente</strong>.
  </p>
  <p>
    Quando você atinge o <strong>8º nível</strong>, você é abençoado com poder divino em batalha. 
    Sempre que uma criatura sofrer dano de um dos seus <strong>truques</strong> ou ataques com arma, 
    você pode causar <strong>1d8 de dano radiante</strong> adicional a essa criatura. 
    Uma vez que você cause esse dano, não pode usar essa característica novamente até o início do seu próximo turno.
  </p>
</div>

<div class="section">
  <h2>Intervenção Divina</h2>
  <p>
    A partir do <strong>10º nível</strong>, você pode invocar sua divindade para intervir em seu favor quando a necessidade for grande.
  </p>
  <p>
    Pedir ajuda à sua divindade requer que você use sua <strong>ação</strong>. Descreva a assistência que você deseja e role um dado percentual (d100). 
    Se o número obtido for igual ou menor que seu nível de clérigo, sua divindade intervém. 
    O Mestre determina a natureza da intervenção; o efeito de qualquer magia de clérigo ou magia de domínio do clérigo seria adequado. 
    Se sua divindade intervier, você não poderá usar essa característica novamente por 7 dias. Caso contrário, você pode tentar novamente após terminar um descanso longo.
  </p>
  <p>
    Ao atingir o <strong>20º nível</strong>, sua invocação para intervenção é bem-sucedida automaticamente, sem necessidade de rolagem.
  </p>
</div>

const toggleWrapper = document.querySelector(".toggle-wrapper");

let isAnimating = false;

/* anima toggle (só uma vez) */
function animateToggle() {
  toggleWrapper.classList.remove("animate-in");
  void toggleWrapper.offsetHeight;
  toggleWrapper.classList.add("animate-in");
}

/* anima card */
function animateCardIn() {
  content.classList.add("animate-in");
}

function animateCardOut(callback) {
  content.classList.remove("animate-in");
  setTimeout(callback, 100);
}

/* troca de conteúdo com lock */
function swapContent(html, is5e) {
  if (isAnimating) return;

  // evita reanimar se já estiver ativo
  if (
    (is5e && btn5e.classList.contains("active")) ||
    (!is5e && btnOne.classList.contains("active"))
  ) {
    return;
  }

  isAnimating = true;

  btn5e.classList.toggle("active", is5e);
  btnOne.classList.toggle("active", !is5e);

  animateCardOut(() => {
    content.innerHTML = html;

    void content.offsetHeight;

    animateCardIn();

    setTimeout(() => {
      isAnimating = false;
    }, 550); // duração da animação do card
  });
}

/* eventos */
btn5e.addEventListener("click", () => swapContent(clerigo5e, true));
btnOne.addEventListener("click", () => swapContent(clerigoOne, false));

/* carga inicial */
requestAnimationFrame(() => {
  animateToggle();
  content.innerHTML = clerigo5e;
  animateCardIn();
  btn5e.classList.add("active");
});
</script>
