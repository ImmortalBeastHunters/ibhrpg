<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monge • D&D</title>

<style>
:root {
  --bg: #0f1115;
  --bg-soft: #181b22;
  --card: #1f2430;
  --border: #2c3240;
  --text: #e6e6eb;
  --muted: #9aa0b4;
  --accent: #5da9ff;
}

* { box-sizing: border-box; }

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, sans-serif;
}

/* BOTÃO VOLTAR */
.back-button {
  position: fixed;
  top: 18px;
  left: 18px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 2000;
}

.hero {
  position: relative;
  height: 520px; /* altura visual mínima */
  width: 100%;
  overflow: visible;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(15,17,21,0.15) 40%,
    var(--bg) 100%
  );
}

.hero-content {
  position: absolute;
  top: 250px; /* controla a altura visual que você quer */
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 1200px; /* card mais largo */
  padding: 0 16px;
  z-index: 5;
}

/* TOGGLE */
.toggle-wrapper {
  display: flex;
  justify-content: center;
  margin-bottom: 18px;
  opacity: 0;
  transform: translateY(-20px);
  transition:
    opacity 0.45s ease-out,
    transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
}

.toggle {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 999px;
  display: flex;
  padding: 6px;
  gap: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.toggle-wrapper.animate-in {
  opacity: 1;
  transform: translateY(0);
}

.toggle button {
  background: transparent;
  border: none;
  border-radius: 999px;
  padding: 8px 14px;
  cursor: pointer;
  opacity: 0.6;
}

.toggle button.active {
  background: white;
  opacity: 1;
}

.toggle img {
  height: 24px;
}

/* Ícone padrão (inativo) */
.toggle button img {
  filter: invert(0%) grayscale(0%);
  transition: filter 0.2s ease;
}

/* Ícone quando o botão está ativo (fundo branco) */
.toggle button.active img {
  filter: invert(100%) grayscale(100%);
}

.card {
  max-width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 34px;
  box-shadow: 0 30px 70px rgba(0,0,0,0.6);
  transition-delay: 0.08s;
  opacity: 0;
  transform: translateY(40px);
  transition:
    opacity 0.55s ease-out,
    transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
}

.card.animate-in {
  opacity: 1;
  transform: translateY(0);
}

/* CONTEÚDO */
.card h1 {
  text-align: center;
  font-size: 2.5rem;
  margin-top: 0;
}

.subtitle {
  text-align: center;
  color: var(--muted);
  margin-bottom: 34px;
}

/* SEÇÕES */
.section {
  margin-bottom: 30px;
}

.section h2 {
  font-size: 1.35rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  margin-bottom: 10px;
}

.section p {
  line-height: 1.65;
}

.table-wrapper {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
  min-width: 720px;
}

table tr.active-row{
  background: rgba(255, 255, 255, 0.08);
}

table tr{
  cursor: pointer;
  transition: background 0.25s ease;
}

@media (hover: hover) {
  table tr:hover{
    background: rgba(255, 255, 255, 0.04);
  }
}

th, td {
  border: 1px solid var(--border);
  padding: 10px;
  text-align: center;
}

th {
  background: var(--bg-soft);
}

.subclasse-container {
  display: flex;
  flex-wrap: wrap;
  grid-template-columns: repeat(auto-fit, 180px);
  gap: 20px;
  justify-content: center;
  margin: 20px auto 0;
}

.subclasse-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 0;
  width: 180px;
  overflow: hidden;
  cursor: pointer;
  text-align: center;
  color: var(--text);
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
}

.subclasse-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
  border-color: var(--accent);
}

.subclasse-card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  display: block;
}

.subclasse-card h3 {
  margin: 12px 0;
  font-size: 1rem;
}

main {
  max-width: 1100px;
  margin: auto;
  padding: 80px 16px;
  margin-top: 260px; /* espaço para o card crescer */
}

/* Links sutis destacados */
.section a{
  color: #9cd1ff;            /* cor base branca */
  font-weight: 600;          /* levemente negrito */
  text-decoration: none;
  position: relative;
  transition: color 0.3s ease;
}

/* Linha animada por baixo do link */
.section a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -2px;              /* espaçamento da linha */
  width: 0%;
  height: 2px;               /* espessura da linha */
  background: #5da9ff;       /* cor sutil da paleta (accent) */
  border-radius: 1px;        /* suaviza a linha */
  transition: width 0.3s ease;
}

/* Hover: anima a linha e muda levemente a cor */
.section a:hover {
  color: #dce6ff;            /* leve clareamento no hover */
}

.section a:hover::after {
  width: 100%;
}

@media (max-width: 600px) {
  .subclasse-container {
    gap: 14px;
  }

  .subclasse-card {
    width: calc(50% - 14px);
    max-width: 180px;
    border-radius: 12px;
  }

  .subclasse-card img {
    height: 110px;
  }

  .subclasse-card h3 {
    font-size: 0.9rem;
    margin: 8px 0;
  }
}
</style>
</head>

<div class="section">
  <h2>Defletir Projéteis</h2>

  <p>
    A partir do <strong>3º nível</strong>, você pode usar sua
    <strong>reação</strong> para defletir ou apanhar um projétil quando
    for atingido por um <strong>ataque de arma à distância</strong>.
    Quando o fizer, o dano que você sofre do ataque é reduzido em
    <strong>1d10 + seu modificador de Destreza + seu nível de monge</strong>.
  </p>

  <p>
    Se o dano for reduzido a <strong>0</strong>, você pode apanhar o
    projétil se ele for pequeno o suficiente para ser segurado em
    <strong>uma mão</strong> e se você tiver, pelo menos, <strong>uma
    mão livre</strong>.
  </p>

  <p>
    Se você apanhar um projétil dessa forma, você pode gastar
    <strong>1 ponto de chi</strong> para realizar um
    <strong>ataque à distância</strong> com a arma ou munição que acabou
    de pegar, como parte da <strong>mesma reação</strong>.
    Você realiza esse ataque com <strong>proficiência</strong>,
    independentemente das armas em que você é proficiente, e o projétil
    conta como uma <strong>arma de monge</strong> para o ataque.
    O alcance do ataque é de <strong>6/18 metros</strong>.
  </p>
</div>

<div class="section">
  <h2>Ataque Energizado por Chi (Opcional)</h2>

  <p>
    A partir do <strong>3º nível</strong>, se você gastar
    <strong>1 ponto de chi ou mais</strong> como parte da sua
    <strong>ação</strong> no seu turno, você pode realizar
    <strong>um ataque</strong> com um <strong>golpe desarmado</strong>
    ou uma <strong>arma de monge</strong> como
    <strong>ação bônus</strong> antes do final do turno.
  </p>
</div>

<div class="section">
  <h2>Incremento no Valor de Habilidade</h2>

  <p>
    Quando você atinge o <strong>4º nível</strong>, e novamente no
    <strong>8º, 12º, 16º e 19º níveis</strong>, você pode aumentar
    seus valores de habilidade.
  </p>

  <p>
    Você pode escolher uma das opções abaixo:
  </p>

  <ul class="bullet-list">
    <li>
      Aumentar <strong>um valor de habilidade</strong>, à sua escolha, em <strong>2</strong>;
    </li>
    <li>
      Aumentar <strong>dois valores de habilidade diferentes</strong>, à sua escolha, em <strong>1</strong> cada.
    </li>
  </ul>

  <p>
    Como padrão, você <strong>não pode elevar um valor de habilidade acima de 20</strong>
    usando essa característica.
  </p>
</div>

<div class="section">
  <h2>Queda Lenta</h2>

  <p>
    A partir do <strong>4º nível</strong>, você pode usar sua
    <strong>reação</strong> quando cair para reduzir o dano de queda
    sofrido em um valor igual a
    <strong>cinco vezes seu nível de monge</strong>.
  </p>
</div>

<div class="section">
  <h2>Cura Acelerada (Opcional)</h2>

  <p>
    A partir do <strong>4º nível</strong>, como uma
    <strong>ação</strong>, você pode gastar
    <strong>2 pontos de chi</strong> e rolar um
    <strong>dado de Artes Marciais</strong>.
    Você recupera uma quantidade de
    <strong>pontos de vida</strong> igual ao valor rolado
    <strong>+ seu bônus de proficiência</strong>.
  </p>
</div>

<div class="section">
  <h2>Ataque Extra</h2>

  <p>
    A partir do <strong>5º nível</strong>, sempre que você realizar a
    <strong>ação de Ataque</strong> no seu turno, você pode atacar
    <strong>duas vezes</strong>, em vez de apenas uma.
  </p>
</div>

<div class="section">
  <h2>Ataque Atordoante</h2>

  <p>
    A partir do <strong>5º nível</strong>, você pode interferir no
    <strong>fluxo de chi</strong> do corpo de um oponente.
    Quando você atinge outra criatura com um
    <strong>ataque corpo a corpo com arma</strong>, você pode gastar
    <strong>1 ponto de chi</strong> para tentar um ataque atordoante.
  </p>

  <p>
    O alvo deve ser bem-sucedido em um
    <strong>teste de resistência de Constituição</strong> ou ficará
    <strong>atordoado</strong> até o final do seu
    <strong>próximo turno</strong>.
  </p>
</div>

<div class="section">
  <h2>Mira Focada (Opcional)</h2>

  <p>
    A partir do <strong>5º nível</strong>, quando você errar uma
    <strong>jogada de ataque</strong>, você pode gastar de
    <strong>1 a 3 pontos de chi</strong> para aumentar o resultado da
    jogada de ataque em <strong>+2</strong> para cada ponto de chi gasto,
    possivelmente transformando o erro em um <strong>acerto</strong>.
  </p>
</div>

<div class="section">
  <h2>Golpes de Chi</h2>

  <p>
    A partir do <strong>6º nível</strong>, seus
    <strong>golpes desarmados</strong> passam a contar como
    <strong>armas mágicas</strong> com o propósito de superar
    <strong>resistência ou imunidade</strong> a ataques e danos
    <strong>não mágicos</strong>.
  </p>
</div>

<div class="section">
  <h2>Evasão</h2>

  <p>
    A partir do <strong>7º nível</strong>, você pode se esquivar
    agilmente de <strong>certos efeitos em área</strong>, como o sopro
    elétrico de um dragão azul ou a magia <em>bola de fogo</em>.
  </p>

  <p>
    Quando você for alvo de um efeito que exige um
    <strong>teste de resistência de Destreza</strong> para sofrer
    <strong>metade do dano</strong>, você não sofre
    <strong>dano algum</strong> se obtiver sucesso no teste, e sofre
    apenas <strong>metade do dano</strong> se falhar.
  </p>
</div>

<div class="section">
  <h2>Mente Tranquila</h2>

  <p>
    A partir do <strong>7º nível</strong>, você pode usar sua
    <strong>ação</strong> para encerrar um efeito que esteja
    <strong>enfeitiçando</strong> ou <strong>amedrontando</strong>
    você.
  </p>
</div>

<div class="section">
  <h2>Pureza Corporal</h2>

  <p>
    A partir do <strong>10º nível</strong>, sua maestria do
    <strong>chi</strong> flui através de você, tornando-o
    <strong>imune</strong> a <strong>doenças</strong> e
    <strong>venenos</strong>.
  </p>
</div>

<div class="section">
  <h2>Idiomas do Sol e da Lua</h2>

  <p>
    A partir do <strong>13º nível</strong>, você aprende a tocar o
    <strong>chi</strong> de outras mentes, permitindo que você
    <strong>compreenda todos os idiomas falados</strong>.
    Além disso, qualquer criatura que possa compreender um
    idioma é capaz de entender o que você diz.
  </p>
</div>

<div class="section">
  <h2>Alma de Diamante</h2>

  <p>
    A partir do <strong>14º nível</strong>, sua maestria do
    <strong>chi</strong> concede a você proficiência em
    <strong>todos os testes de resistência</strong>.
  </p>

  <p>
    Além disso, sempre que você realizar um teste de
    resistência e falhar, você pode gastar
    <strong>1 ponto de chi</strong> para rolar novamente e
    ficar com o <strong>segundo resultado</strong>.
  </p>
</div>

<div class="section">
  <h2>Corpo Atemporal</h2>

  <p>
    A partir do <strong>15º nível</strong>, seu
    <strong>chi</strong> sustenta você de tal forma que você
    não sofre os efeitos da <strong>velhice</strong> e não
    pode envelhecer magicamente. Você ainda morrerá de
    velhice, no entanto.
  </p>

  <p>
    Além disso, você não precisa mais de
    <strong>comida</strong> ou <strong>água</strong>.
  </p>
</div>

<div class="section">
  <h2>Corpo Vazio</h2>

  <p>
    A partir do <strong>18º nível</strong>, você pode usar
    sua <strong>ação</strong> para gastar
    <strong>4 pontos de chi</strong> e ficar
    <strong>invisível</strong> por <strong>1 minuto</strong>.
  </p>

  <p>
    Durante esse tempo, você também adquire
    <strong>resistência a todos os danos</strong>, exceto
    <strong>dano de energia</strong>.
  </p>

  <p>
    Além disso, você pode gastar 8 pontos de chi para 
    conjurar a magia projeção astral, sem precisar de 
    componentes materiais. Quando o fizer, você não pode 
    levar qualquer outra criatura com você.
  </p>
</div>

<div class="section">
  <h2>Auto Aperfeiçoamento</h2>

  <p>
    A partir do <strong>20º nível</strong>, quando você rolar
    <strong>iniciativa</strong> e não tiver
    <strong>nenhum ponto de chi restante</strong>, você
    recupera <strong>4 pontos de chi</strong>.
  </p>
</div>
`;

const toggleWrapper = document.querySelector(".toggle-wrapper");

let isAnimating = false;

/* anima toggle (só uma vez) */
function animateToggle() {
  toggleWrapper.classList.remove("animate-in");
  void toggleWrapper.offsetHeight;
  toggleWrapper.classList.add("animate-in");
}

/* anima card */
function animateCardIn() {
  content.classList.add("animate-in");
}

function animateCardOut(callback) {
  content.classList.remove("animate-in");
  setTimeout(callback, 100);
}

/* troca de conteúdo com lock */
function swapContent(html, is5e) {
  if (isAnimating) return;

  // evita reanimar se já estiver ativo
  if (
    (is5e && btn5e.classList.contains("active")) ||
    (!is5e && btnOne.classList.contains("active"))
  ) {
    return;
  }

  isAnimating = true;

  btn5e.classList.toggle("active", is5e);
  btnOne.classList.toggle("active", !is5e);

  animateCardOut(() => {
    content.innerHTML = html;

    void content.offsetHeight;

    animateCardIn();

    setTimeout(() => {
      isAnimating = false;
    }, 550); // duração da animação do card
  });
}

/* eventos */
btn5e.addEventListener("click", () => swapContent(monge5e, true));
btnOne.addEventListener("click", () => swapContent(mongeOne, false));

/* carga inicial */
requestAnimationFrame(() => {
  animateToggle();
  content.innerHTML = monge5e;
  animateCardIn();
  btn5e.classList.add("active");
});
</script>
