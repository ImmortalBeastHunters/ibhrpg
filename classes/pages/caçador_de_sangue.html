<head>

<title>Caçador de Sangue • D&D</title>

<style>
:root {
  --bg: #0f1115;
  --bg-soft: #181b22;
  --card: #1f2430;
  --border: #2c3240;
  --text: #e6e6eb;
  --muted: #9aa0b4;
  --accent: #5da9ff;
}

* { box-sizing: border-box; }

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, sans-serif;
}

/* BOTÃO VOLTAR */
.back-button {
  position: fixed;
  top: 18px;
  left: 18px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 2000;
}

.hero {
  position: relative;
  height: 520px; /* altura visual mínima */
  width: 100%;
  overflow: visible;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(15,17,21,0.15) 40%,
    var(--bg) 100%
  );
}

.hero-content {
  position: absolute;
  top: 250px; /* controla a altura visual que você quer */
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 1200px; /* card mais largo */
  padding: 0 16px;
  z-index: 5;
}

/* TOGGLE */
.toggle-wrapper {
  display: flex;
  justify-content: center;
  margin-bottom: 18px;
  opacity: 0;
  transform: translateY(-20px);
  transition:
    opacity 0.45s ease-out,
    transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
}

.toggle {
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: 999px;
  display: flex;
  padding: 6px;
  gap: 6px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.toggle-wrapper.animate-in {
  opacity: 1;
  transform: translateY(0);
}

.toggle button {
  background: transparent;
  border: none;
  border-radius: 999px;
  padding: 8px 14px;
  cursor: pointer;
  opacity: 0.6;
}

.toggle button.active {
  background: white;
  opacity: 1;
}

.toggle img {
  height: 24px;
}

/* Ícone padrão (inativo) */
.toggle button img {
  filter: invert(0%) grayscale(0%);
  transition: filter 0.2s ease;
}

/* Ícone quando o botão está ativo (fundo branco) */
.toggle button.active img {
  filter: invert(100%) grayscale(100%);
}

.card {
  max-width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 34px;
  box-shadow: 0 30px 70px rgba(0,0,0,0.6);
  transition-delay: 0.08s;
  opacity: 0;
  transform: translateY(40px);
  transition:
    opacity 0.55s ease-out,
    transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
}

.card.animate-in {
  opacity: 1;
  transform: translateY(0);
}

/* CONTEÚDO */
.card h1 {
  text-align: center;
  font-size: 2.5rem;
  margin-top: 0;
}

.subtitle {
  text-align: center;
  color: var(--muted);
  margin-bottom: 34px;
}

/* SEÇÕES */
.section {
  margin-bottom: 30px;
}

.section h2 {
  font-size: 1.35rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  margin-bottom: 10px;
}

.section p {
  line-height: 1.65;
}

.table-wrapper {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
  min-width: 720px;
}

table tr.active-row{
  background: rgba(255, 255, 255, 0.08);
}

table tr{
  cursor: pointer;
  transition: background 0.25s ease;
}

@media (hover: hover) {
  table tr:hover{
    background: rgba(255, 255, 255, 0.04);
  }
}

th, td {
  border: 1px solid var(--border);
  padding: 10px;
  text-align: center;
}

th {
  background: var(--bg-soft);
}

.subclasse-container {
  display: flex;
  flex-wrap: wrap;
  grid-template-columns: repeat(auto-fit, 180px);
  gap: 20px;
  justify-content: center;
  margin: 20px auto 0;
}

.subclasse-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 0;
  width: 180px;
  overflow: hidden;
  cursor: pointer;
  text-align: center;
  color: var(--text);
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
}

.subclasse-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
  border-color: var(--accent);
}

.subclasse-card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  display: block;
}

.subclasse-card h3 {
  margin: 12px 0;
  font-size: 1rem;
}

main {
  max-width: 1100px;
  margin: auto;
  padding: 80px 16px;
  margin-top: 260px; /* espaço para o card crescer */
}

/* Links sutis destacados */
.section a{
  color: #9cd1ff;            /* cor base branca */
  font-weight: 600;          /* levemente negrito */
  text-decoration: none;
  position: relative;
  transition: color 0.3s ease;
}

/* Linha animada por baixo do link */
.section a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -2px;              /* espaçamento da linha */
  width: 0%;
  height: 2px;               /* espessura da linha */
  background: #5da9ff;       /* cor sutil da paleta (accent) */
  border-radius: 1px;        /* suaviza a linha */
  transition: width 0.3s ease;
}

/* Hover: anima a linha e muda levemente a cor */
.section a:hover {
  color: #dce6ff;            /* leve clareamento no hover */
}

.section a:hover::after {
  width: 100%;
}

@media (max-width: 600px) {
  .subclasse-container {
    gap: 14px;
  }

  .subclasse-card {
    width: calc(50% - 14px);
    max-width: 180px;
    border-radius: 12px;
  }

  .subclasse-card img {
    height: 110px;
  }

  .subclasse-card h3 {
    font-size: 0.9rem;
    margin: 8px 0;
  }
}
</style>
</head>

    A partir do <strong>6º nível</strong>, quando você causar dano a uma criatura
    com uma arma que possua um <strong>Rito Carmesim</strong> ativo, você pode
    canalizar a magia de hemocraft para gravar uma marca arcana ardente nessa
    criatura <em>(nenhuma ação é necessária)</em>. Você sempre sabe a direção da
    criatura marcada enquanto ela estiver no mesmo plano de existência que
    você.
  </p>

    Além disso, sempre que a criatura marcada causar dano a você ou a uma
    criatura que você possa ver a até <strong>1,5 metro</strong> de você, a
    criatura marcada sofre dano psíquico igual ao seu <strong>modificador de
    Hemocraft</strong> (mínimo de 1).
  </p>

  <p>
    Sua marca dura até que você a dissipe ou até usar essa característica para
    aplicar a marca em outra criatura. A sua marca pode ser dissipada com
    <strong>Desintegrar Magia</strong> e é tratada como uma magia de nível igual à
    metade do seu nível de caçador de sangue (máximo de 9º nível).
  </p>

  <p>
    Após usar essa característica, você não pode usá-la novamente até terminar
    um descanso curto ou longo.
  </p>
</div>

<div class="section">
  <h2>Psicometria Sombria</h2>

  <p>
    Ao atingir o <strong>9º nível</strong>, você adquire um talento sobrenatural
    para discernir os segredos que envolvem relíquias misteriosas ou locais
    tocados pelo mal. Sempre que você realizar um teste de Inteligência
    (<strong>História</strong>) para recordar informações sobre a história
    sinistra ou trágica de um objeto que esteja tocando ou do local em que se
    encontra, você tem vantagem no teste.
  </p>

  <p>
    A critério do Mestre, uma rolagem suficientemente alta pode fazer com que
    seu personagem experimente breves visões do passado conectadas ao objeto
    ou local.
  </p>
</div>

<div class="section">
  <h2>Aumento das Trevas</h2>

  <p>
    A partir do <strong>10º nível</strong>, a magia de hemocraft permeia seu corpo
    para reforçar permanentemente sua resistência. Seu deslocamento aumenta em
    <strong>1,5 metro</strong>, e você recebe um bônus nos testes de resistência
    de <strong>Força, Destreza e Constituição</strong> igual ao seu
    <strong>modificador de Hemocraft</strong> (mínimo de +1).
  </p>
</div>

<div class="section">
  <h2>Marca de Amarração</h2>

  <p>
    A partir do <strong>13º nível</strong>, o dano psíquico causado pela sua
    <strong>Marca de Castigação</strong> aumenta para o dobro do seu modificador
    de Hemocraft (mínimo de 2).
  </p>

  <p>
    Além disso, uma criatura marcada não pode realizar a ação
    <strong>Disparada</strong>. Se ela tentar se teleportar ou deixar seu plano
    atual por qualquer meio, sofre <strong>4d6 de dano psíquico</strong> e deve
    realizar um teste de resistência de <strong>Sabedoria</strong>. Em caso de
    falha, a tentativa de teleporte ou de deixar o plano falha.
  </p>
</div>

<div class="section">
  <h2>Alma Endurecida</h2>

  <p>
    Ao atingir o <strong>14º nível</strong>, você passa a ter vantagem em testes
    de resistência contra as condições <strong>enfeitiçado</strong> e
    <strong>amedrontado</strong>.
  </p>
</div>

<div class="section">
  <h2>Domínio Sanguíneo</h2>

  <p>
    Ao alcançar o <strong>20º nível</strong>, sua maestria sobre a magia do sangue
    atinge o auge, mitigando seus sacrifícios e ampliando sua perícia. Uma vez
    por turno, sempre que uma característica de caçador de sangue exigir que
    você role um <strong>dado de hemocraft</strong>, você pode rolar o dado
    novamente e usar qualquer um dos resultados.
  </p>

  <p>
    Além disso, sempre que você acertar um <strong>acerto crítico</strong> com
    uma arma que possua um <strong>Rito Carmesim</strong> ativo, você recupera um
    uso gasto da sua característica <strong>Maldito de Sangue</strong>.
  </p>
</div>

const toggleWrapper = document.querySelector(".toggle-wrapper");

let isAnimating = false;

/* anima toggle (só uma vez) */
function animateToggle() {
  toggleWrapper.classList.remove("animate-in");
  void toggleWrapper.offsetHeight;
  toggleWrapper.classList.add("animate-in");
}

/* anima card */
function animateCardIn() {
  content.classList.add("animate-in");
}

function animateCardOut(callback) {
  content.classList.remove("animate-in");
  setTimeout(callback, 100);
}

/* troca de conteúdo com lock */
function swapContent(html, is5e) {
  if (isAnimating) return;

  // evita reanimar se já estiver ativo
  if (
    (is5e && btn5e.classList.contains("active")) ||
    (!is5e && btnOne.classList.contains("active"))
  ) {
    return;
  }

  isAnimating = true;

  btn5e.classList.toggle("active", is5e);
  btnOne.classList.toggle("active", !is5e);

  animateCardOut(() => {
    content.innerHTML = html;

    void content.offsetHeight;

    animateCardIn();

    setTimeout(() => {
      isAnimating = false;
    }, 550); // duração da animação do card
  });
}

/* eventos */
btn5e.addEventListener("click", () => swapContent(caçadorDeSangue5e, true));
btnOne.addEventListener("click", () => swapContent(caçadorDeSangueOne, false));

/* carga inicial */
requestAnimationFrame(() => {
  animateToggle();
  content.innerHTML = caçadorDeSangue5e;
  animateCardIn();
  btn5e.classList.add("active");
});
</script>
